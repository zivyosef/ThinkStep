<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">

<style>
body {
  font-family: Arial;
  direction: rtl;
}

.box {
  width: 90%;
  max-width: 500px;
  margin: 20px auto;
  padding: 20px;
  background: #5ea07e;
  border-radius: 25px;
}

.row {
  display: flex;
  gap: 20px;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  background: black;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.summary {
  width: 90%;
  max-width: 500px;
  margin: 20px auto;
  padding: 20px;
  background: #3d7a5f;
  color: white;
  border-radius: 25px;
  font-size: 20px;
  text-align: center;
  justify-content: center;
   font-weight: bold;
}
.success{
display: flex;
justify-content: flex-end;
text-align: right;
font-weight: bold;  
} 

</style>
</head>

<body>

<div class="box">

  <!-- שורה עליונה -->
  <div class="row">
    <input id="subject" placeholder="מקצוע">
    <input id="topic" placeholder="נושא העבודה">
  </div>

  <!-- שורה תחתונה -->
  <div class="row">
    <input id="pages" placeholder="מספר עמודים">
    <input id="date" type="date">
  </div>

  <button onclick="show()">בוא נתחיל</button>

</div>

<!-- קופסת סיכום -->
<div class="summary">
  <h3>סיכום:</h3>
  <p id="out"></p>
  <p1 class="success">!בהצלחה</p1>
</div>

<script>
function show() {
  document.getElementById("out").innerHTML =
    "מקצוע: " + document.getElementById("subject").value + "   " +
    "נושא: " + document.getElementById("topic").value + "    " +
    "עמודים: " + document.getElementById("pages").value + " <br> " +
    "תאריך: " + document.getElementById("date").value;
}
</script>

</body>
</html>
