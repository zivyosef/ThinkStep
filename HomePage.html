<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>דף עבודה | למידה חכמה</title>
<link rel="stylesheet" href="styles.css">
<style>
/* ===== PAGE LAYOUT ===== */
.work-page {
  max-width: 580px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding-bottom: 40px;
}

/* ===== CARDS ===== */
.card {
  background: var(--bg-card);
  border: 1px solid rgba(148, 252, 196, 0.7);
  border-radius: 16px;
  padding: 1.35rem;
  box-shadow: 0 4px 16px rgba(7,11,22,0.18);
  transition: border-color 0.2s ease;
}

.card:hover { border-color: rgba(148,252,196,0.9); }

.card-accent {
  background: rgba(20, 30, 55, 0.85);
  border: 1px solid rgba(148, 252, 196, 0.7);
  border-radius: 16px;
  padding: 1.35rem;
  box-shadow: 0 4px 20px rgba(37,99,235,0.12);
}

/* ===== LABELS & INPUTS ===== */
label, .label-alt {
  font-size: 13px;
  color: var(--text-muted);
  display: block;
  margin-bottom: 6px;
  font-weight: 500;
}

textarea,
input[type="text"],
input[type="date"],
input[type="number"] {
  width: 100%;
  border: 1px solid rgba(148,163,184,0.2);
  border-radius: 9px;
  padding: 9px 12px;
  font-size: 14px;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: rgba(255,255,255,0.06);
  color: var(--text);
  transition: all 0.2s;
}

textarea { resize: vertical; }

textarea:focus,
input:focus {
  outline: none;
  border-color: var(--accent);
  background: rgba(37,99,235,0.08);
  box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
}

/* ===== BUTTONS ===== */
.btn {
  width: 100%;
  padding: 11px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  color: white;
  border: none;
  border-radius: 9px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  margin-top: 8px;
  transition: all 0.25s;
}

.btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 18px rgba(37,99,235,0.35);
}

.btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }

.btn-outline {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid rgba(148,163,184,0.28);
}

.btn-outline:hover {
  background: rgba(148,163,184,0.1);
  color: var(--text-bright);
  box-shadow: none;
}

.btn-sm { width: auto; padding: 7px 13px; margin-top: 0; font-size: 13px; }

/* ===== SECTION TITLE ===== */
.section-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-bright);
  margin-bottom: 14px;
}

/* ===== ROW LAYOUT ===== */
.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}

/* ===== DIVIDER ===== */
.demands-divider {
  border: none;
  border-top: 1px solid rgba(148,163,184,0.18);
  margin: 14px 0;
}

/* ===== SUMMARY ===== */
.summary-row {
  display: flex;
  justify-content: space-between;
  padding: 7px 0;
  border-bottom: 1px solid rgba(148,163,184,0.1);
  font-size: 14px;
}

.summary-row:last-child { border-bottom: none; }
.summary-key { color: var(--text-muted); }
.summary-val { font-weight: 600; color: var(--text-bright); }

/* ===== SPINNER ===== */
.spinner {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.25);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-left: 6px;
}

.hidden { display: none; }

/* ===== TIMELINE ===== */
.timeline-item {
  display: grid;
  grid-template-columns: 1.4fr 1fr auto;
  gap: 8px;
  align-items: center;
  background: rgba(255,255,255,0.04);
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 8px;
  border: 1px solid rgba(148,163,184,0.14);
}

.timeline-item strong {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
}

.timeline-item input { border: 1px solid rgba(148,163,184,0.2); }

.timeline-empty {
  font-size: 14px;
  color: var(--text-muted);
  text-align: center;
  padding: 1.2rem 0;
}

/* ===== TIMELINE ACTIONS ===== */
.timeline-actions { display: flex; gap: 10px; margin-top: 12px; }
.timeline-actions .btn { flex: 1; }

/* ===== SUB-TASKS ===== */
.subtask-item {
  background: rgba(255,255,255,0.04);
  border-radius: 11px;
  padding: 13px;
  margin-bottom: 10px;
  border: 1px solid rgba(148,163,184,0.14);
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
  transition: border-color 0.2s ease;
}

.subtask-item:hover { border-color: rgba(37,99,235,0.3); }

.subtask-item input[type="text"] {
  font-weight: 600;
  font-size: 14px;
}

.subtask-item textarea {
  font-size: 13px;
  color: var(--text-secondary);
  resize: vertical;
  min-height: 50px;
}

.subtask-delete {
  position: absolute;
  top: 10px; left: 10px;
  background: none; border: none;
  cursor: pointer;
  font-size: 16px;
  color: var(--text-muted);
  padding: 2px 6px;
  border-radius: 4px;
  transition: color 0.2s;
}

.subtask-delete:hover { color: #ef4444; }

.subtask-add-row { margin-top: 4px; }

/* ===== CARD HEADER ===== */
.card-header-row {
  font-size: 13px;
  color: rgba(148,163,184,0.9);
  margin-bottom: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
</style>
</head>
<body>
<div class="page">

  <!-- Navigation Header -->
  <header class="site-header">
    <div class="logo"></div>
    <nav>
      <a href="index.html">דף הבית</a>
      <a href="HomePage.html" class="active">דף עבודה</a>
      <a href="RecuresiveDecomposition.html">התקדמות</a>
      <a href="search.html">חיפוש</a>
      <a href="profile.html">פרופיל</a>
      <a href="about.html">אודות</a>
    </nav>
    <button class="cta-button" onclick="window.location.href='index.html'">דף הבית</button>
  </header>

  <div class="work-page">

    <!-- כרטיס פרטי משימה -->
    <div class="card-accent">
      <div class="card-header-row">פרטי המשימה</div>
      <div class="row">
        <div><label>מקצוע</label><input type="text" id="subject" placeholder="היסטוריה, מדע..."></div>
        <div><label>נושא</label><input type="text" id="topic" placeholder="נושא העבודה"></div>
      </div>
      <div class="row">
        <div><label>מספר עמודים</label><input type="number" id="pages" placeholder="5" min="1" max="1000"></div>
        <div><label>תאריך הגשה</label><input type="date" id="date"></div>
      </div>

      <hr class="demands-divider">

      <label>דרישות העבודה</label>
      <textarea id="demands-input" rows="3" placeholder="הדבק כאן את הנחיות המורה / דרישות המטלה..."></textarea>
      <button class="btn" id="analyze-btn" onclick="handleAnalyzeDemands()">
        <span id="analyze-spinner" class="spinner hidden"></span>
        <span id="analyze-label">נתח וצור משימות</span>
      </button>
    </div>

    <!-- סיכום -->
    <div id="summary-card" class="card hidden">
      <div class="section-title">סיכום המשימה</div>
      <div id="summary-content"></div>
    </div>

    <!-- משימות לביצוע -->
    <div id="subtasks-card" class="card hidden">
      <div class="section-title">משימות לביצוע</div>
      <div id="subtasks-list"></div>
      <div class="subtask-add-row">
        <button class="btn btn-outline" onclick="addSubtask()">+ הוסף משימה</button>
      </div>
    </div>

    <!-- לוח זמנים -->
    <div class="card">
      <div class="section-title">לוח זמנים מותאם אישית</div>
      <p style="font-size:14px;color:var(--text-muted);margin-bottom:14px;line-height:1.6;">
        המערכת בונה תוכנית לפי תאריך ההגשה — אפשר לשנות כל שלב ידנית.
      </p>
      <div id="timeline-list">
        <div class="timeline-empty">עדיין לא נבנה לוח זמנים.</div>
      </div>
      <div class="timeline-actions">
        <button class="btn btn-outline" onclick="rebuildTimeline()">בנה לוח זמנים</button>
        <button class="btn btn-outline" onclick="resetTimeline()">אפס שינויים</button>
      </div>
    </div>

  </div><!-- /work-page -->
</div><!-- /page -->

  window.SUPABASE_URL      = 'https://fflgijtemitvpjwiofue.supabase.co';

</script>
<script type="importmap">
{
  "imports": {
    "@google/genai":         "https://esm.sh/@google/genai",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
  }
}
</script>
<script type="module">
import './aiService.js';
import logicManager from './logicManager.js';
import { getCurrentUser, saveTaskState, loadTaskState } from './supabase.js';
window.supabaseHelpers = { getCurrentUser, saveTaskState, loadTaskState };

const MILESTONES = [
  { name: "הבנת המשימה ובחירת מבנה", p: 0.10 },
  { name: "בחירת מקורות",             p: 0.30 },
  { name: "איסוף מקורות",              p: 0.50 },
  { name: "כתיבת פסקה ראשונה",        p: 0.70 },
  { name: "עריכה וסיכום",              p: 0.90 },
  { name: "הגשה סופית",               p: 1.00 }
];

let currentTimeline = [];
let subtasks = [];

function setLoading(labelId, spinnerId, btnId, on) {
  const labels = { 'analyze-label': ['נתח וצור משימות', 'מנתח...'] };
  document.getElementById(labelId).textContent = on ? labels[labelId][1] : labels[labelId][0];
  document.getElementById(spinnerId).classList.toggle('hidden', !on);
  if (btnId) document.getElementById(btnId).disabled = on;
}

function showSummary() {
  const subject = document.getElementById('subject').value.trim();
  const topic   = document.getElementById('topic').value.trim();
  const pages   = document.getElementById('pages').value.trim();
  const date    = document.getElementById('date').value;

  const summaryCard = document.getElementById('summary-card');
  summaryCard.classList.remove('hidden');
  document.getElementById('summary-content').innerHTML = `
    ${subject ? `<div class="summary-row"><span class="summary-key">מקצוע</span><span class="summary-val">${subject}</span></div>` : ''}
    ${topic   ? `<div class="summary-row"><span class="summary-key">נושא</span><span class="summary-val">${topic}</span></div>` : ''}
    ${pages   ? `<div class="summary-row"><span class="summary-key">עמודים</span><span class="summary-val">${pages}</span></div>` : ''}
    ${date    ? `<div class="summary-row"><span class="summary-key">תאריך הגשה</span><span class="summary-val">${date}</span></div>` : ''}
  `;
  if (date) rebuildTimeline();
}

async function handleAnalyzeDemands() {
  const demandsText = document.getElementById('demands-input').value.trim();
  if (!demandsText) { alert('אנא הדבק את דרישות העבודה לפני הניתוח'); return; }

  showSummary();
  setLoading('analyze-label', 'analyze-spinner', 'analyze-btn', true);

  const context = {
    subject: document.getElementById('subject').value.trim(),
    topic:   document.getElementById('topic').value.trim(),
    pages:   document.getElementById('pages').value.trim(),
    dueDate: document.getElementById('date').value,
  };

  try {
    const result = await logicManager.analyzeDemandsAndCreateSubtasks(demandsText, context);
    subtasks = result.length > 0 ? result : [];
    if (subtasks.length === 0) {
      alert('לא הצלחנו לנתח את הדרישות. נסה לנסח אותן בצורה ברורה יותר.');
    } else {
      renderSubtasks();
      document.getElementById('subtasks-card').classList.remove('hidden');
    }
  } catch (e) {
    console.error('שגיאה בניתוח דרישות:', e);
    alert('אירעה שגיאה. בדוק את החיבור לאינטרנט ונסה שוב.');
  } finally {
    setLoading('analyze-label', 'analyze-spinner', 'analyze-btn', false);
  }
}

function renderSubtasks() {
  document.getElementById('subtasks-list').innerHTML = subtasks.map((st, i) => `
    <div class="subtask-item">
      <button class="subtask-delete" onclick="deleteSubtask(${i})" title="מחק משימה">×</button>
      <input type="text" value="${escapeAttr(st.title)}" placeholder="שם המשימה"
        oninput="subtasks[${i}].title = this.value">
      <textarea placeholder="תיאור המשימה"
        oninput="subtasks[${i}].description = this.value">${escapeHtml(st.description)}</textarea>
    </div>
  `).join('');
}

function escapeAttr(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function escapeHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function deleteSubtask(i) {
  subtasks.splice(i, 1);
  renderSubtasks();
}

function addSubtask() {
  subtasks.push({ id: `task-${Date.now()}`, title: '', description: '' });
  renderSubtasks();
  document.getElementById('subtasks-card').classList.remove('hidden');
  const items = document.querySelectorAll('.subtask-item input[type="text"]');
  if (items.length) items[items.length - 1].focus();
}

function rebuildTimeline() {
  const dateVal = document.getElementById('date').value;
  const list    = document.getElementById('timeline-list');

  if (!dateVal) {
    list.innerHTML = '<div class="timeline-empty">בחר תאריך הגשה כדי לבנות תוכנית.</div>';
    currentTimeline = [];
    return;
  }

  const finalDate = new Date(dateVal);
  if (isNaN(finalDate.getTime())) {
    list.innerHTML = '<div class="timeline-empty">תאריך לא תקין.</div>';
    return;
  }

  const today     = new Date();
  const totalDays = Math.max(0, Math.round((finalDate - today) / 86400000));

  currentTimeline = MILESTONES.map(m => {
    const d = new Date(today);
    d.setDate(today.getDate() + Math.round(totalDays * m.p));
    return { milestone: m.name, date: d.toISOString().split('T')[0] };
  });

  renderTimeline();
}

function renderTimeline() {
  document.getElementById('timeline-list').innerHTML = currentTimeline.map((item, i) => `
    <div class="timeline-item">
      <strong>${item.milestone}</strong>
      <input type="date" value="${item.date}" aria-label="${item.milestone}" id="tl-${i}">
      <button class="btn btn-outline btn-sm" onclick="saveMilestone(${i})">שמור</button>
    </div>`).join('');
}

function saveMilestone(i) {
  const val = document.getElementById(`tl-${i}`).value;
  if (val) currentTimeline[i].date = val;
  renderTimeline();
}

function resetTimeline() { rebuildTimeline(); }

window.handleAnalyzeDemands = handleAnalyzeDemands;
window.rebuildTimeline      = rebuildTimeline;
window.resetTimeline        = resetTimeline;
window.saveMilestone        = saveMilestone;
window.deleteSubtask        = deleteSubtask;
window.addSubtask           = addSubtask;
</script>

</body>
