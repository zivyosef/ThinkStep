<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO LIST</title>
  <style>
    body { font-family: Arial, sans-serif; direction: rtl; padding: 20px; }
    #taskContainer { margin-top: 10px; }
  </style>
  <script>
    // משתנה למספר משימות ומערך משימות
    let count = 1;
    let tasks = [];

    // פונקציה להוספת משימה
    function addToList() {
      const taskText = document.getElementById("task").value.trim();
      if (!taskText) return alert("לא ניתן להוסיף משימה ריקה.");

      tasks.push(taskText);
      const taskContainer = document.getElementById("taskContainer");

      taskContainer.innerHTML += `<input type='checkbox' id='task${count}'><label for='task${count}'>${taskText}</label><br>`;
      document.getElementById("task").value = "";
      count++;
    }

    // בדיקת משימות
    document.getElementById("checkList").addEventListener("click", () => {
      if (!tasks.length) return alert("אין משימות ברשימה.");

      let emptyTasks = 0;
      tasks.forEach(task => {
        if (task.trim() === "") emptyTasks++;
      });

      alert(`סה\"כ משימות: ${tasks.length}, משימות ריקות: ${emptyTasks}`);
    });
  </script>
</head>
<body>
  <header>
    <h1>רשימת משימות</h1>
  </header>
  <main>
    <label id="labelStyle" for="task">מה המשימה שלי?</label>
    <textarea id="task" rows="3" cols="30"></textarea>
    <br>
    <button onclick="addToList()">הוסף לרשימה</button>
    <button id="checkList">בדיקת הרשימה</button>
    <div id="taskContainer"></div>
  </main>
</body>
</html>
