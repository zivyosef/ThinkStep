<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פרופיל משתמש - MentorAI</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: #fafafa;
            color: #262626;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        nav {
            width: 100%;
            height: 60px;
            background: white;
            border-bottom: 1px solid #dbdbdb;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            top: 0;
            z-index: 100;
        }

        .nav-content {
            width: 100%;
            max-width: 935px;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            font-weight: bold;
            font-size: 20px;
        }

        .profile-container {
            margin-top: 90px;
            width: 100%;
            max-width: 935px;
            padding: 20px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            margin-bottom: 44px;
        }

        /* שילוב חכם: תמונת פרופיל כחולה עם גיבוי של צבע אפור ניטרלי */
        .profile-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background-color: #dbdbdb; /* צבע גיבוי אפור במידה והתמונה לא נטענת */
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/9/99/Sample_User_Icon.png');
            background-size: cover;
            background-position: center;
            margin-left: 100px;
        }

        .profile-info h2 {
            font-size: 28px;
            font-weight: 300;
            margin: 0 0 20px 0;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .edit-btn {
            background-color: transparent;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            padding: 5px 9px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .stats {
            display: flex;
            gap: 40px;
            margin-bottom: 20px;
            list-style: none;
            padding: 0;
        }

        .stats li { font-size: 16px; }
        .stats li b { font-weight: 600; }

        .bio {
            font-size: 16px;
            line-height: 24px;
        }

        .profile-tabs {
            border-top: 1px solid #dbdbdb;
            display: flex;
            justify-content: center;
            gap: 60px;
            margin-top: 40px;
        }

        .tab {
            padding: 15px 0;
            font-size: 12px;
            font-weight: 600;
            color: #8e8e8e;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 1px;
        }

        .tab.active {
            color: #262626;
            border-top: 1px solid #262626;
            margin-top: -1px;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px;
            margin-top: 20px;
        }

        .project-card {
            aspect-ratio: 1 / 1;
            background-color: #efefef;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            text-align: center;
            padding: 10px;
            border-top: 4px solid #dbdbdb;
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-content">
        <div>MentorAI</div>
        <div style="font-size: 16px;">🔍 חיפוש</div>
    </div>
</nav>

<div class="profile-container">
    
    <header class="profile-header">
        <div class="profile-image"></div>
        
        <div class="profile-info">
            <h2>
                user_name_123
                <button class="edit-btn">עריכת פרופיל</button>
            </h2>
            
            <ul class="stats">
                <li><b>5</b> פרויקטים</li>
                <li><b>12</b> משימות שבוצעו</li>
                <li><b>85%</b> ציון למידה</li>
            </ul>
            
            <div class="bio">
                <b>ישראל ישראלי</b>
                <br>
                תלמיד כיתה י"א | מתמחה בביולוגיה 📚
            </div>
        </div>
    </header>

    <div class="profile-tabs">
        <div class="tab active">📋 הפרויקטים שלי</div>
        <div class="tab">⏳ בתהליך</div>
    </div>

    <div class="projects-grid">
        <div class="project-card" style="border-top-color: #4caf50;">
            <span>עבודת מחקר בביולוגיה</span>
        </div>
        <div class="project-card" style="border-top-color: #2196f3;">
            <span>סיכום ספרות</span>
        </div>
        <div class="project-card" style="border-top-color: #ff9800;">
            <span>מטלה באנגלית</span>
        </div>
    </div>

</div>

</body>
</html>
