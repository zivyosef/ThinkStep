<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חיפוש | למידה חכמה</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .search-container {
            max-width: 720px;
            margin: 0 auto;
        }

        /* ===== SEARCH HERO ===== */
        .search-hero {
            text-align: center;
            padding: 40px 0 32px;
            animation: slideInUp 0.7s ease-out;
        }

        .search-hero h1 {
            font-size: clamp(2rem, 4vw, 2.8rem);
            color: var(--text-bright);
            font-weight: 700;
            margin-bottom: 10px;
        }

        .search-hero p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* ===== SEARCH BOX ===== */
        .search-box {
            position: relative;
            margin-bottom: 28px;
        }

        .search-icon {
            position: absolute;
            top: 50%; right: 18px;
            transform: translateY(-50%);
            font-size: 1.2rem;
            color: var(--text-muted);
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: 16px 52px 16px 130px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            direction: rtl;
            transition: border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }

        .search-input::placeholder { color: var(--text-muted); }

        .search-btn {
            position: absolute;
            top: 50%; left: 10px;
            transform: translateY(-50%);
            background: linear-gradient(135deg, var(--accent), var(--purple));
            color: white;
            border: none;
            padding: 9px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .search-btn:hover { opacity: 0.9; transform: translateY(-50%) scale(1.02); }

        /* ===== FILTER CHIPS ===== */
        .filter-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }

        .filter-chip {
            padding: 7px 16px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 0.88rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-chip:hover,
        .filter-chip.active {
            border-color: var(--accent);
            background: rgba(37, 99, 235, 0.14);
            color: var(--text-bright);
        }

        /* ===== RESULTS ===== */
        .results-section {
            animation: fadeIn 0.5s ease-out;
        }

        .results-header {
            color: var(--text-muted);
            font-size: 0.88rem;
            margin-bottom: 14px;
        }

        .result-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px 22px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), border-color 0.2s, background 0.2s, box-shadow 0.2s;
        }

        .result-card:hover {
            transform: translateY(-3px);
            border-color: var(--border-focus);
            background: var(--bg-card-hover);
            box-shadow: 0 8px 22px rgba(37, 99, 235, 0.14);
        }

        .result-card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 6px;
        }

        .result-title {
            color: var(--text-bright);
            font-weight: 700;
            font-size: 1rem;
        }

        .result-badge {
            font-size: 0.76rem;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 999px;
            white-space: nowrap;
        }

        .badge-task     { background: rgba(37,99,235,0.18);  color: #93c5fd; border: 1px solid rgba(37,99,235,0.3); }
        .badge-progress { background: rgba(16,185,129,0.16); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.28); }
        .badge-tip      { background: rgba(124,58,237,0.18); color: #c4b5fd; border: 1px solid rgba(124,58,237,0.3); }

        .result-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.55;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state .empty-icon {
            font-size: 3rem;
            margin-bottom: 14px;
            display: block;
        }

        .empty-state p { font-size: 0.95rem; line-height: 1.6; }

        /* ===== QUICK LINKS ===== */
        .quick-links {
            margin-top: 36px;
        }

        .quick-links h3 {
            color: var(--text-muted);
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        .quick-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 10px;
        }

        .quick-card {
            background: var(--bg-card);
            border: 1px solid rgba(148, 252, 196, 0.7);
            border-radius: var(--radius-md);
            padding: 16px;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            display: block;
            transition: all 0.2s ease;
            color: var(--text-secondary);
        }

        .quick-card:hover {
            border-color: rgba(148, 252, 196, 0.9);
            background: var(--bg-card-hover);
            color: var(--text-bright);
            transform: translateY(-2px);
        }

        .quick-card .quick-icon { font-size: 1.5rem; margin-bottom: 8px; display: block; }
        .quick-card .quick-label { font-size: 0.88rem; font-weight: 600; }
    </style>
</head>
<body>
    <div class="page">

        <header class="site-header">
            <div class="logo"></div>
            <nav>
                <a href="index.html">דף הבית</a>
                <a href="HomePage.html">דף עבודה</a>
                <a href="search.html" class="active">חיפוש</a>
                <a href="profile.html">פרופיל</a>
                <a href="about.html">אודות</a>
            </nav>
            <button class="cta-button" onclick="window.location.href='index.html'">דף הבית</button>
        </header>

        <div class="search-container">

            <div class="search-hero">
                <h1>חיפוש</h1>
                <p>חפש משימות, מקצועות, טיפים וכל מה שקשור ללמידה</p>
            </div>

            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="searchInput"
                       placeholder="מה אתה מחפש?" autocomplete="off"
                       oninput="handleSearch(this.value)"
                       onkeydown="if(event
                       .key==='Enter') performSearch()">
                <button class="search-btn" onclick="performSearch()">חפש</button>
            </div>

            <div class="filter-row" id="filterRow">
                <button class="filter-chip active" onclick="setFilter('all', this)">הכל</button>
                <button class="filter-chip" onclick="setFilter('task', this)">משימות</button>
                <button class="filter-chip" onclick="setFilter('progress', this)">התקדמות</button>
                <button class="filter-chip" onclick="setFilter('tip', this)">טיפים</button>
            </div>

           - <div class="results-section" id="resultsSection">
                <!-- Quick links shown by default -->
                <div id="quickLinksArea" class="quick-links">
                    <h3>קישורים מהירים</h3>
                    <div class="quick-grid">
                        <a href="HomePage.html" class="quick-card">
                            <span class="quick-icon">📋</span>
                            <span class="quick-label">דף עבודה</span>
                        </a>
                        <a href="RecuresiveDecomposition.html" class="quick-card">
                            <span class="quick-icon">📊</span>
                            <span class="quick-label">התקדמות</span>
                        </a>
                        <a href="profile.html" class="quick-card">
                            <span class="quick-icon">👤</span>
                            <span class="quick-label">פרופיל</span>
                        </a>
                        <a href="about.html" class="quick-card">
                            <span class="quick-icon">💡</span>
                            <span class="quick-label">אודות</span>
                        </a>
                    </div>
                </div>

                <div id="resultsArea" style="display:none;"></div>
            </div>

        </div>
    </div>

    <script>
        const SEARCH_DATA = [
            { type: 'task',     title: 'צור משימה חדשה',          desc: 'פתח את דף העבודה ובנה משימה עם AI',           url: 'HomePage.html' },
            { type: 'task',     title: 'ניתוח דרישות עבודה',       desc: 'הדבק הנחיות מורה וקבל משימות מפורקות',        url: 'HomePage.html' },
            { type: 'task',     title: 'לוח זמנים אוטומטי',        desc: 'בנה תוכנית לימוד לפי תאריך ההגשה',            url: 'HomePage.html' },
            { type: 'progress', title: 'מטרות שבועיות',            desc: 'הגדר ועקוב אחר יעדי השבוע שלך',               url: 'RecuresiveDecomposition.html' },
            { type: 'progress', title: 'גרף פעילות',               desc: 'ראה את ההתקדמות שלך לאורך השבוע',             url: 'RecuresiveDecomposition.html' },
            { type: 'progress', title: 'לוח זמנים של פרויקט',      desc: 'ראה את אבני הדרך של הפרויקט הנוכחי',          url: 'RecuresiveDecomposition.html' },
            { type: 'tip',      title: 'טכניקת Pomodoro',          desc: 'עבוד 25 דקות, קח הפסקה של 5 דקות',            url: 'RecuresiveDecomposition.html' },
            { type: 'tip',      title: 'פירוק משימות גדולות',       desc: 'חלק כל עבודה לצעדים קטנים וברי ביצוע',       url: 'HomePage.html' },
            { type: 'tip',      title: 'סדרי עדיפויות',            desc: 'התמקד במשימות החשובות ביותר תחילה',            url: 'HomePage.html' },
        ];

        let currentFilter = 'all';

        function setFilter(filter, el) {
            currentFilter = filter;
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            const q = document.getElementById('searchInput').value.trim();
            if (q) performSearch();
        }

        function handleSearch(val) {
            if (!val.trim()) {
                document.getElementById('quickLinksArea').style.display = 'block';
                document.getElementById('resultsArea').style.display   = 'none';
            }
        }

        function performSearch() {
            const q = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!q) return;

            document.getElementById('quickLinksArea').style.display = 'none';
            document.getElementById('resultsArea').style.display    = 'block';

            const filtered = SEARCH_DATA.filter(item => {
                const matchFilter = currentFilter === 'all' || item.type === currentFilter;
                const matchQuery  = item.title.toLowerCase().includes(q) || item.desc.toLowerCase().includes(q);
                return matchFilter && matchQuery;
            });

            const area = document.getElementById('resultsArea');

            if (filtered.length === 0) {
                area.innerHTML = `
                    <div class="empty-state">
                        <span class="empty-icon">🔍</span>
                        <p>לא נמצאו תוצאות עבור "<strong>${escapeHtml(q)}</strong>".<br>נסה מילות חיפוש אחרות.</p>
                    </div>`;
                return;
            }

            area.innerHTML = `<div class="results-header">${filtered.length} תוצאות</div>` +
                filtered.map(item => `
                    <div class="result-card" onclick="window.location.href='${item.url}'">
                        <div class="result-card-top">
                            <span class="result-title">${escapeHtml(item.title)}</span>
                            <span class="result-badge ${badgeClass(item.type)}">${typeLabel(item.type)}</span>
                        </div>
                        <div class="result-desc">${escapeHtml(item.desc)}</div>
                    </div>`).join('');
        }

        function badgeClass(type) {
            return { task: 'badge-task', progress: 'badge-progress', tip: 'badge-tip' }[type] || '';
        }

        function typeLabel(type) {
            return { task: 'משימה', progress: 'התקדמות', tip: 'טיפ' }[type] || type;
        }

        function escapeHtml(str) {
            return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }
    </script>
</body>
</html>
