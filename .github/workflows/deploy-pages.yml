name: Deploy ThinkStep to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate config.js with API Keys
        run: |
          echo "window.OPENROUTER_API_KEY = '${{ secrets.VITE_OPENROUTER_API_KEY }}';" > legacy/config.js
          echo "window.SUPABASE_URL = '${{ secrets.VITE_SUPABASE_URL }}';" >> legacy/config.js
          echo "window.SUPABASE_ANON_KEY = '${{ secrets.VITE_SUPABASE_ANON_KEY }}';" >> legacy/config.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: './legacy'

      - uses: actions/deploy-pages@v4
        id: deployment
