<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פרופיל | למידה חכמה</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            padding-bottom: 60px;
        }

        .profile-container {
            max-width: 940px;
            margin: 0 auto;
        }

        /* ===== PROFILE HEADER CARD ===== */
        .profile-header {
            display: flex;
            gap: 24px;
            align-items: center;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 28px;
            box-shadow: var(--shadow-card);
            backdrop-filter: blur(10px);
            margin-bottom: 22px;
            animation: slideInUp 0.7s ease-out;
        }

        .profile-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/9/99/Sample_User_Icon.png');
            background-size: cover;
            background-position: center;
            box-shadow: 0 12px 36px rgba(37, 99, 235, 0.22);
            flex-shrink: 0;
        }

        .profile-info {
            flex: 1;
            min-width: 0;
        }

        .profile-info h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-bright);
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .edit-btn {
            background: rgba(37, 99, 235, 0.12);
            border: 1px solid rgba(37, 99, 235, 0.3);
            border-radius: 999px;
            color: #bfdbfe;
            font-size: 0.88rem;
            font-weight: 600;
            padding: 8px 14px;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s ease;
        }

        .edit-btn:hover {
            background: rgba(37, 99, 235, 0.22);
        }

        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 18px;
            list-style: none;
        }

        .stats li {
            font-size: 0.94rem;
            color: var(--text-secondary);
        }

        .stats li b {
            font-weight: 700;
            color: var(--text-bright);
        }

        .bio {
            font-size: 0.97rem;
            line-height: 1.75;
            color: var(--text-secondary);
        }

        /* ===== TABS ===== */
        .profile-tabs {
            display: flex;
            gap: 10px;
            padding: 20px 0;
            border-top: 1px solid var(--border);
            margin-top: 20px;
        }

        .tab {
            font-size: 0.87rem;
            color: var(--text-muted);
            font-weight: 600;
            padding: 10px 16px;
            border-radius: 14px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            font-family: inherit;
            background: none;
        }

        .tab:hover {
            background: var(--bg-card);
            color: var(--text-secondary);
            border-color: var(--border);
        }

        .tab.active {
            color: var(--text-bright);
            background: rgba(37, 99, 235, 0.18);
            border-color: rgba(37, 99, 235, 0.25);
        }

        /* ===== PROJECTS GRID ===== */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 20px;
            margin-bottom: 24px;
        }

        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 22px;
            min-height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--text);
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 8px 20px rgba(7, 11, 22, 0.18);
            transition: transform 0.25s ease, border-color 0.2s ease;
            border-top-width: 3px;
        }

        .project-card:hover {
            transform: translateY(-3px);
            border-color: rgba(148, 163, 184, 0.28);
        }

        .project-card span {
            display: block;
        }

        /* ===== ACTIVITY TABLE ===== */
        .activity-history {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 24px;
            margin-bottom: 24px;
            animation: slideInUp 0.9s ease-out;
        }

        .activity-history h2 {
            color: var(--text-bright);
            font-size: 1.1rem;
            margin-bottom: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.93rem;
        }

        th,
        td {
            text-align: right;
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        td {
            color: var(--text);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        tbody tr {
            transition: background 0.2s ease;
        }

        tbody tr:hover {
            background: rgba(37, 99, 235, 0.06);
        }

        /* ===== BACK LINK ===== */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            border: 1px solid var(--border);
            padding: 11px 18px;
            border-radius: 16px;
            transition: background 0.2s ease, border-color 0.2s ease;
            font-size: 0.93rem;
        }

        .back-link:hover {
            background: rgba(37, 99, 235, 0.1);
            border-color: rgba(37, 99, 235, 0.28);
        }

        /* ===== EDIT MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            animation: slideUp 0.3s ease;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-header h3 {
            font-size: 1.4rem;
            color: var(--text-bright);
            margin: 0;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.8rem;
            cursor: pointer;
            transition: color 0.2s ease;
            padding: 0;
        }

        .close-btn:hover {
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.92rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid rgba(148, 163, 184, 0.22);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s ease, background 0.2s ease;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        .modal-footer button {
            flex: 1;
            padding: 12px 18px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.93rem;
            font-family: inherit;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }

        .btn-save {
            background: linear-gradient(135deg, var(--accent), var(--purple));
            color: white;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(37, 99, 235, 0.3);
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.07);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.11);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 760px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
            }

            .profile-info h2 {
                justify-content: center;
            }

            .stats {
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <!-- Navigation Header -->
        <header class="site-header">
            <div class="logo"></div>
            <nav>
                <a href="index.html">דף הבית</a>
                <a href="HomePage.html">דף עבודה</a>
                <a href="RecuresiveDecomposition.html">התקדמות</a>
                <a href="search.html">חיפוש</a>
                <a href="profile.html" class="active">פרופיל</a>
                <a href="about.html">אודות</a>
            </nav>
            <button class="cta-button" id="loginBtn" onclick="handleHeaderButtonClick()">התחברות</button>
        </header>

        <div class="profile-container">

            <!-- Profile Card -->
            <section class="profile-header">
                <div class="profile-image"></div>
                <div class="profile-info">
                    <h2>
                        <span id="profileName"></span>
                        <button class="edit-btn" onclick="openEditModal()">עריכת פרופיל</button>
                    </h2>
                    <ul class="stats">
                        <li><b id="projectCount">0</b> פרויקטים</li>
                        <li><b id="taskCount">0</b> משימות שבוצעו</li>
                        <li><b id="learningScore">0%</b> ציון למידה</li>
                    </ul>
                    <div class="bio">
                        <b id="userFullName">ישראל ישראלי</b><br>
                        <span id="userDescription">תלמיד כיתה י"א | מתמחה בביולוגיה 📚</span>
                    </div>

                    <div class="profile-tabs">
                        <button class="tab active">📋 הפרויקטים שלי</button>
                        <button class="tab">⏳ בתהליך</button>
                    </div>
                </div>
            </section>

            <!-- Projects Grid -->
            <div class="projects-grid">
                <div class="project-card" style="border-top-color:#4caf50;">
                    <span>עבודת מחקר בביולוגיה</span>
                </div>
                <div class="project-card" style="border-top-color:#2196f3;">
                    <span>סיכום ספרות</span>
                </div>
                <div class="project-card" style="border-top-color:#ff9800;">
                    <span>מטלה באנגלית</span>
                </div>
            </div>

            <!-- Activity History -->
            <section class="activity-history">
                <h2>היסטוריית פעילות</h2>
                <table>
                    <thead>
                        <tr>
                            <th>תאריך</th>
                            <th>פעולה</th>
                            <th>פרטים</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </section>

            <a class="back-link" href="index.html">← חזור לדף הבית</a>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>עריכת פרופיל</h3>
                <button class="close-btn" onclick="closeEditModal()">&times;</button>
            </div>
            <form onsubmit="saveProfileChanges(event)">
                <div class="form-group">
                    <label for="editFullName">שם מלא</label>
                    <input type="text" id="editFullName" placeholder="הזן שם מלא" required>
                </div>
                <div class="form-group">
                    <label for="editDescription">תיאור</label>
                    <textarea id="editDescription" placeholder="הזן תיאור קצר עלייך"></textarea>
                </div>
                <div class="form-group">
                    <label for="editLearningScore">ציון למידה (%)</label>
                    <input type="number" id="editLearningScore" min="0" max="100" placeholder="הזן ציון בין 0 ל-100">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" onclick="closeEditModal()">ביטול</button>
                    <button type="submit" class="btn-save">שמור שינויים</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // עדכון כפתור הכניסה בטעינה דף
        function updateHeaderButton() {
            const userProfile = JSON.parse(localStorage.getItem('userProfile'));
            const loginBtn = document.getElementById('loginBtn');
            
            if (userProfile && userProfile.username) {
                loginBtn.textContent = `ברוך הבא ${userProfile.username}`;
                loginBtn.style.background = 'rgba(37, 99, 235, 0.18)';
                loginBtn.style.border = '1px solid rgba(37, 99, 235, 0.3)';
            } else {
                loginBtn.textContent = 'התחברות';
                loginBtn.style.background = '';
                loginBtn.style.border = '';
            }
        }

        // פונקציה שתטפל בלחיצה על כפתור הכניסה
        function handleHeaderButtonClick() {
            const userProfile = JSON.parse(localStorage.getItem('userProfile'));
            
            if (userProfile && userProfile.username) {
                // המשתמש מחובר - אפשר להוסיף פעולת התנתקות או לחזור לדף הבית
                window.location.href = 'index.html';
            } else {
                // המשתמש לא מחובר - לך לדף הבית כדי להתחבר
                window.location.href = 'index.html';
            }
        }

        const defaultProfile = {
            username: 'משתמש חדש',
            email: 'לא הוגדר',
            accountType: 'תלמיד',
            status: 'לא מחובר',
            fullName: 'ישראל ישראלי',
            description: 'תלמיד כיתה י"א | מתמחה בביולוגיה 📚',
            projectCount: 5,
            taskCount: 12,
            learningScore: '85%',
        };

        const profileData = JSON.parse(localStorage.getItem('userProfile') || 'null') || defaultProfile;
        const activityHistory = JSON.parse(localStorage.getItem('activityHistory') || '[]');

        document.getElementById('profileName').textContent = profileData.username;
        document.getElementById('userFullName').textContent = profileData.fullName || defaultProfile.fullName;
        document.getElementById('userDescription').textContent = profileData.description || defaultProfile.description;
        document.getElementById('projectCount').textContent = profileData.projectCount || defaultProfile.projectCount;
        document.getElementById('taskCount').textContent = profileData.taskCount || defaultProfile.taskCount;
        document.getElementById('learningScore').textContent = profileData.learningScore || defaultProfile.learningScore;

        const tableBody = document.querySelector('tbody');
        tableBody.innerHTML = activityHistory.length
            ? activityHistory.map(entry => `
                <tr>
                    <td>${entry.date}</td>
                    <td>${entry.action}</td>
                    <td>${entry.details}</td>
                </tr>`).join('')
            : '<tr><td colspan="3" style="color:var(--text-muted);text-align:center;">אין פעולות להצגה עדיין.</td></tr>';

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function () {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // עדכן את כפתור הכניסה בטעינה דף
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', updateHeaderButton);
        } else {
            updateHeaderButton();
        }
        // פונקציות עריכת פרופיל
        function openEditModal() {
            const userProfile = JSON.parse(localStorage.getItem('userProfile'));
            if (userProfile) {
                document.getElementById('editFullName').value = userProfile.fullName || '';
                document.getElementById('editDescription').value = userProfile.description || '';
                document.getElementById('editLearningScore').value = userProfile.learningScore?.replace('%', '') || '';
            }
            document.getElementById('editModal').classList.add('show');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
        }

        function saveProfileChanges(event) {
            event.preventDefault();

            const fullName = document.getElementById('editFullName').value.trim();
            const description = document.getElementById('editDescription').value.trim();
            const learningScore = document.getElementById('editLearningScore').value;

            if (!fullName) {
                alert('יש להזין שם מלא');
                return;
            }

            // קבל את הפרופיל הקיים ועדכן אותו
            const userProfile = JSON.parse(localStorage.getItem('userProfile'));
            if (userProfile) {
                userProfile.fullName = fullName;
                userProfile.description = description;
                userProfile.learningScore = learningScore ? learningScore + '%' : '0%';
                
                localStorage.setItem('userProfile', JSON.stringify(userProfile));

                // עדכן את התצוגה
                document.getElementById('userFullName').textContent = fullName;
                document.getElementById('userDescription').textContent = description;
                document.getElementById('learningScore').textContent = userProfile.learningScore;

                alert('הפרטים שלך עודכנו בהצלחה!');
                closeEditModal();
            }
        }

        // סגור מודל בלחיצה מחוץ לו
        window.onclick = function(event) {
            const editModal = document.getElementById('editModal');
            if (event.target === editModal) {
                closeEditModal();
            }
        };    </script>
</body>

</html>
