<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פרופיל | למידה חכמה</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .profile-container { max-width: 860px; margin: 0 auto; }

        /* ── Auth gate ────────────────────────────────────────── */
        .auth-gate {
            background: var(--bg-card);
            border: 1px solid rgba(148,252,196,0.25);
            border-radius: 22px; padding: 40px 32px;
            max-width: 420px; margin: 60px auto; text-align: center;
        }
        .auth-gate h2 { font-size: 1.6rem; color: var(--text-bright); margin-bottom: 8px; }
        .auth-gate p  { color: var(--text-muted); margin-bottom: 28px; font-size: 0.95rem; }
        .auth-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
        .auth-tab  {
            flex: 1; padding: 10px; border: 1px solid rgba(148,163,184,0.22);
            border-radius: 10px; background: transparent; color: var(--text-muted);
            font-family: inherit; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: all 0.2s;
        }
        .auth-tab.active { background: rgba(37,99,235,0.18); border-color: rgba(37,99,235,0.35); color: var(--text-bright); }
        .auth-field { margin-bottom: 14px; text-align: right; }
        .auth-field label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; }
        .auth-field input {
            width: 100%; padding: 11px 14px;
            border: 1px solid rgba(148,163,184,0.22); border-radius: 10px;
            background: rgba(255,255,255,0.05); color: var(--text);
            font-family: inherit; font-size: 0.95rem; box-sizing: border-box; transition: border-color 0.2s;
        }
        .auth-field input:focus { outline: none; border-color: var(--accent); background: rgba(37,99,235,0.06); }
        .auth-submit {
            width: 100%; padding: 13px;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            color: white; border: none; border-radius: 11px;
            font-size: 1rem; font-weight: 700; font-family: inherit;
            cursor: pointer; margin-top: 6px; transition: all 0.2s;
        }
        .auth-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,0.35); }
        .auth-submit:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
        .auth-error { color: #f87171; font-size: 0.88rem; margin-top: 10px; min-height: 20px; }

        /* ── Profile header ───────────────────────────────────── */
        .profile-header {
            display: flex; gap: 24px; align-items: center;
            background: var(--bg-card); border: 1px solid rgba(148,252,196,0.25);
            border-radius: 22px; padding: 28px; margin-bottom: 22px;
            box-shadow: var(--shadow-card);
        }
        .profile-avatar {
            width: 88px; height: 88px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            display: grid; place-items: center;
            font-size: 2.4rem; flex-shrink: 0; color: white; font-weight: 700;
        }
        .profile-info h2  { font-size: 1.5rem; font-weight: 700; color: var(--text-bright); margin-bottom: 4px; }
        .profile-info .email-label { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 14px; }
        .logout-btn {
            padding: 8px 16px; background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.25); border-radius: 10px;
            color: #fca5a5; font-family: inherit; font-weight: 600; font-size: 0.85rem;
            cursor: pointer; transition: all 0.2s;
        }
        .logout-btn:hover { background: rgba(239,68,68,0.2); }

        /* ── Section ─────────────────────────────────────────── */
        .profile-section {
            background: var(--bg-card); border: 1px solid rgba(148,252,196,0.2);
            border-radius: 20px; padding: 28px; margin-bottom: 22px;
        }
        .section-title {
            font-size: 13px; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.07em;
            margin-bottom: 20px; padding-bottom: 10px;
            border-bottom: 1px solid rgba(148,163,184,0.12);
        }

        /* ── Project card ────────────────────────────────────── */
        .project-card {
            background: rgba(37,99,235,0.07); border: 1px solid rgba(37,99,235,0.2);
            border-radius: 16px; padding: 22px;
        }
        .project-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
        .project-card-title  { font-size: 1.15rem; font-weight: 700; color: var(--text-bright); }
        .project-badge {
            padding: 4px 12px; border-radius: 999px; font-size: 0.75rem; font-weight: 700; white-space: nowrap;
            background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7;
        }
        .project-meta { font-size: 0.85rem; color: var(--text-muted); display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
        .prog-wrap { height: 6px; background: rgba(255,255,255,0.06); border-radius: 999px; overflow: hidden; margin-bottom: 6px; }
        .prog-bar  { height: 100%; background: linear-gradient(90deg,#10b981,#3b82f6); border-radius: 999px; transition: width 0.5s; }
        .prog-label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 16px; }
        .open-btn {
            display: inline-block; padding: 9px 20px;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            color: white; border: none; border-radius: 10px;
            font-family: inherit; font-weight: 700; font-size: 0.9rem;
            cursor: pointer; text-decoration: none; transition: all 0.2s;
        }
        .open-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(37,99,235,0.4); }

        .no-project-msg { text-align: center; padding: 32px; color: var(--text-muted); font-size: 0.95rem; line-height: 1.8; }
        .no-project-msg a { color: var(--accent); font-weight: 600; text-decoration: none; }
        .no-project-msg a:hover { text-decoration: underline; }

        /* ── Weekly goals + tip grid ─────────────────────────── */
        .extras-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 22px;
        }
        .progress-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(148,252,196,0.7);
            border-radius: 18px; padding: 22px; transition: all 0.25s;
        }
        .progress-card:hover { transform: translateY(-3px); background: rgba(255,255,255,0.05); }
        .progress-card-title {
            color: var(--text-muted); font-weight: 700; font-size: 0.82rem;
            margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.08em;
        }
        .stat-value { font-size: 1.8rem; font-weight: 800; color: var(--text-bright); line-height: 1; margin-bottom: 4px; }
        .stat-label { font-size: 0.82rem; color: var(--text-muted); font-weight: 500; }
        .goals-input-group { display: flex; gap: 8px; margin-bottom: 14px; }
        .goals-input-group input {
            flex: 1; padding: 9px 13px; border: 1px solid rgba(148,163,184,0.22);
            border-radius: 10px; background: rgba(255,255,255,0.05); color: var(--text);
            font-size: 0.9rem; font-family: inherit; transition: border-color 0.2s;
        }
        .goals-input-group input:focus { outline: none; border-color: var(--accent); }
        .goals-input-group button {
            padding: 9px 14px; background: linear-gradient(135deg, var(--accent), var(--purple));
            color: white; border: none; border-radius: 10px; cursor: pointer;
            font-weight: 700; font-size: 0.88rem; font-family: inherit; transition: all 0.2s;
        }
        .goals-list { max-height: 220px; overflow-y: auto; margin-bottom: 14px; }
        .goal-item {
            display: flex; align-items: center; gap: 10px; padding: 10px 12px;
            background: rgba(255,255,255,0.03); border-radius: 9px; margin-bottom: 6px; transition: background 0.2s;
        }
        .goal-item:hover { background: rgba(255,255,255,0.05); }
        .goal-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); }
        .goal-text { flex: 1; color: var(--text-secondary); font-size: 0.9rem; }
        .goal-item.completed .goal-text { color: var(--text-muted); text-decoration: line-through; }
        .goal-delete { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.1rem; padding: 2px 4px; border-radius: 4px; transition: color 0.2s; }
        .goal-delete:hover { color: #ef4444; }
        .goals-reset-btn {
            width: 100%; padding: 8px; background: rgba(239,68,68,0.1);
            color: #fca5a5; border: 1px solid rgba(239,68,68,0.25); border-radius: 8px;
            cursor: pointer; font-size: 0.82rem; font-family: inherit; font-weight: 600;
            margin-bottom: 10px; transition: all 0.2s;
        }
        .goals-reset-btn:hover { background: rgba(239,68,68,0.18); }
        .progress-bar-container {
            background: rgba(255,255,255,0.04); border-radius: 999px;
            overflow: hidden; height: 10px; border: 1px solid var(--border); margin-bottom: 8px;
        }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--purple)); border-radius: 999px; transition: width 0.4s; }
        .progress-percentage { color: var(--text-muted); font-size: 0.85rem; text-align: center; }
        .tip-content {
            background: linear-gradient(135deg, rgba(37,99,235,0.12), rgba(124,58,237,0.12));
            border: 1px solid rgba(37,99,235,0.2); border-radius: 14px; padding: 18px;
            margin-bottom: 14px; min-height: 90px; display: flex; flex-direction: column; justify-content: center;
        }
        .tip-icon { font-size: 2.2rem; margin-bottom: 10px; }
        .tip-text { color: var(--text-secondary); font-size: 0.93rem; line-height: 1.6; text-align: center; }
        .tip-button {
            width: 100%; padding: 11px;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            color: white; border: none; border-radius: 10px; cursor: pointer;
            font-weight: 700; font-size: 0.9rem; font-family: inherit; transition: all 0.2s;
        }
        .tip-button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,0.4); }

        @media (max-width: 600px) { .profile-header { flex-direction: column; } }
    </style>
</head>
<body>
<div class="page">
    <header class="site-header">
        <div class="logo"></div>
        <nav>
            <a href="index.html">דף הבית</a>
            <a href="HomePage.html">דף עבודה</a>
            <a href="writing.html">כתיבה</a>
            <a href="search.html">חיפוש</a>
            <a href="profile.html" class="active">פרופיל</a>
            <a href="about.html">אודות</a>
        </nav>
        <button class="cta-button" id="welcomeBtn" onclick="window.location.href='index.html'">דף הבית</button>
    </header>
    <script>
      (function(){
        const p = JSON.parse(localStorage.getItem('userProfile') || '{}');
        const name = p.username || p.fullName;
        if (name) {
          const btn = document.getElementById('welcomeBtn');
          btn.textContent = 'ברוך הבא: ' + name;
          btn.onclick = function(){ window.location.href = 'profile.html'; };
        }
      })();
    </script>

    <div class="profile-container">

        <!-- Auth gate (not logged in) -->
        <div id="authGate">
            <div class="auth-gate">
                <div style="font-size:2.8rem;margin-bottom:12px">👤</div>
                <h2>ברוך הבא</h2>
                <p>התחבר כדי לשמור ולצפות בפרויקטים שלך מכל מכשיר</p>
                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchTab('login')">התחברות</button>
                    <button class="auth-tab"         onclick="switchTab('register')">הרשמה</button>
                </div>
                <form onsubmit="handleAuth(event)">
                    <div class="auth-field" id="nameField" style="display:none">
                        <label>שם תצוגה</label>
                        <input type="text" id="authName" placeholder="השם שיופיע בפרופיל">
                    </div>
                    <div class="auth-field">
                        <label>אימייל</label>
                        <input type="email" id="authEmail" placeholder="your@email.com" required>
                    </div>
                    <div class="auth-field">
                        <label>סיסמה</label>
                        <input type="password" id="authPassword" placeholder="לפחות 6 תווים" required minlength="6">
                    </div>
                    <button type="submit" class="auth-submit" id="authSubmit">התחבר</button>
                    <div class="auth-error" id="authError"></div>
                </form>
            </div>
        </div>

        <!-- Profile view (logged in) -->
        <div id="profileView" style="display:none">
            <section class="profile-header">
                <div class="profile-avatar" id="profileAvatar">?</div>
                <div class="profile-info" style="flex:1">
                    <h2 id="profileName">...</h2>
                    <div class="email-label" id="profileEmail"></div>
                    <button class="logout-btn" onclick="handleLogout()">התנתק</button>
                </div>
            </section>

            <div class="profile-section">
                <div class="section-title">הפרויקט השמור שלך</div>
                <div id="projectContent">
                    <div style="text-align:center;padding:24px;color:var(--text-muted)">טוען...</div>
                </div>
            </div>

            <!-- extras: goals + completed + tip -->
            <div class="extras-grid">
                <!-- מטרות שבועיות -->
                <div class="progress-card">
                    <div class="progress-card-title">🎯 מטרות שבועיות</div>
                    <div class="goals-input-group">
                        <input type="text" id="goalInput" placeholder="הוסף מטרה חדשה..."
                               onkeydown="if(event.key==='Enter') addWeeklyGoal()">
                        <button onclick="addWeeklyGoal()">הוסף</button>
                    </div>
                    <div class="goals-list" id="goalsList"></div>
                    <button class="goals-reset-btn" onclick="resetWeeklyGoals()">🗑 אפס מטרות שבועיות</button>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="goalsProgressBar" style="width:0%"></div>
                    </div>
                    <div class="progress-percentage" id="goalsPercentage">0/0 משימות הושלמו</div>
                </div>

                <!-- משימות שהושלמו -->
                <div class="progress-card">
                    <div class="progress-card-title">✅ משימות שהושלמו</div>
                    <div class="stat-value" id="progressCompleted">0</div>
                    <div class="stat-label">משימות שהושלמו השבוע</div>
                </div>

                <!-- טיפ יומי -->
                <div class="progress-card">
                    <div class="progress-card-title">💡 טיפ יומי</div>
                    <div class="tip-content">
                        <div class="tip-icon" id="tipIcon">💡</div>
                        <div class="tip-text" id="tipText">טוען טיפ...</div>
                    </div>
                    <button class="tip-button" onclick="getNewTip()">טיפ חדש</button>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="./config.js"></script>
<script type="module" src="./supabase.js"></script>
<script>
let _authMode = 'login';

function switchTab(mode) {
    _authMode = mode;
    document.querySelectorAll('.auth-tab').forEach((t,i) =>
        t.classList.toggle('active', (mode==='login'&&i===0)||(mode==='register'&&i===1)));
    document.getElementById('nameField').style.display = mode === 'register' ? 'block' : 'none';
    document.getElementById('authSubmit').textContent  = mode === 'login' ? 'התחבר' : 'הירשם';
    document.getElementById('authError').textContent   = '';
}

async function handleAuth(e) {
    e.preventDefault();
    if (!window.supabaseHelpers) { document.getElementById('authError').textContent='מערכת לא נטענה, רענן.'; return; }
    const email = document.getElementById('authEmail').value.trim();
    const pass  = document.getElementById('authPassword').value;
    const name  = document.getElementById('authName').value.trim();
    const btn   = document.getElementById('authSubmit');
    btn.disabled = true; btn.textContent = 'מעבד...';
    document.getElementById('authError').textContent = '';

    const result = _authMode === 'login'
        ? await window.supabaseHelpers.signIn(email, pass)
        : await window.supabaseHelpers.signUp(email, pass, name || email.split('@')[0]);

    if (result.error) {
        document.getElementById('authError').textContent = xlateErr(result.error.message);
    } else {
        await showProfileView();
    }
    btn.disabled = false; btn.textContent = _authMode === 'login' ? 'התחבר' : 'הירשם';
}

function xlateErr(m) {
    if (m.includes('Invalid login'))      return 'אימייל או סיסמה שגויים.';
    if (m.includes('already registered')) return 'האימייל כבר רשום.';
    if (m.includes('Email not confirmed'))return 'יש לאשר את האימייל תחילה.';
    if (m.includes('Password'))           return 'הסיסמה חייבת לכלול לפחות 6 תווים.';
    return m;
}

async function handleLogout() {
    await window.supabaseHelpers?.signOut();
    localStorage.removeItem('userProfile');
    document.getElementById('profileView').style.display = 'none';
    document.getElementById('authGate').style.display    = 'block';
    const btn = document.getElementById('welcomeBtn');
    if (btn) { btn.textContent = 'דף הבית'; btn.onclick = () => window.location.href = 'index.html'; }
}

async function showProfileView() {
    const user = await window.supabaseHelpers.getCurrentUser();
    if (!user) return;
    document.getElementById('authGate').style.display    = 'none';
    document.getElementById('profileView').style.display = 'block';
    const name = user.user_metadata?.display_name || user.email.split('@')[0];
    localStorage.setItem('userProfile', JSON.stringify({ username: name, email: user.email }));
    const btn = document.getElementById('welcomeBtn');
    if (btn) { btn.textContent = 'ברוך הבא: ' + name; btn.onclick = () => window.location.href = 'profile.html'; }
    document.getElementById('profileName').textContent   = name;
    document.getElementById('profileEmail').textContent  = user.email;
    document.getElementById('profileAvatar').textContent = name.charAt(0).toUpperCase();
    renderProject(user.id);
    renderGoals();
    updateGoalsProgress();
    loadStatCards();
    getNewTip();
}

async function renderProject(userId) {
    const box = document.getElementById('projectContent');
    try {
        const state = await window.supabaseHelpers.loadTaskState(userId);
        if (!state?.chunks?.length) {
            box.innerHTML = `<div class="no-project-msg">
                עדיין אין פרויקט שמור.<br>
                <a href="HomePage.html">פתח דף עבודה</a>, נתח משימה ולחץ <strong>💾 שמור התקדמות</strong>.
            </div>`; return;
        }
        const CHECKLIST_KEY = 'task_checklist_state';
        const comp  = JSON.parse(localStorage.getItem(CHECKLIST_KEY) || '{}');
        const total = state.chunks.length;
        const done  = state.chunks.filter((_,i) => !!comp[`task-${_.id||i}`]).length;
        const pct   = total ? Math.round(done/total*100) : 0;
        const saved = state.savedAt ? new Date(state.savedAt).toLocaleDateString('he-IL') : '';

        box.innerHTML = `<div class="project-card">
            <div class="project-card-header">
                <div class="project-card-title">${esc(state.topic||'פרויקט')}</div>
                <div class="project-badge">פעיל</div>
            </div>
            <div class="project-meta">
                ${state.subject ? `<span>מקצוע: ${esc(state.subject)}</span>` : ''}
                ${state.dueDate ? `<span>הגשה: ${state.dueDate}</span>`       : ''}
                ${saved         ? `<span>נשמר: ${saved}</span>`               : ''}
                <span>${total} משימות</span>
            </div>
            <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
            <div class="prog-label">${done} / ${total} הושלמו (${pct}%)</div>
            <div style="display:flex;gap:10px;flex-wrap:wrap">
              <a class="open-btn" href="writing.html">✍️ המשך כתיבה</a>
              <a class="open-btn" href="HomePage.html" style="background:rgba(37,99,235,0.2);border:1px solid rgba(37,99,235,0.35)">📋 דף עבודה</a>
            </div>
        </div>`;

        // Cache locally so other pages see it right away
        localStorage.setItem('decompose_app_state', JSON.stringify(state));
    } catch(e) {
        box.innerHTML = `<div class="no-project-msg">שגיאה בטעינת הפרויקט.</div>`;
    }
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ===== WEEKLY GOALS ===== */
function addWeeklyGoal() {
    const input = document.getElementById('goalInput');
    const text  = input.value.trim();
    if (!text) return;
    const goals = JSON.parse(localStorage.getItem('weeklyGoals') || '[]');
    goals.push({ id: Date.now(), text, completed: false });
    localStorage.setItem('weeklyGoals', JSON.stringify(goals));
    input.value = '';
    renderGoals();
    updateGoalsProgress();
    loadStatCards();
}

function renderGoals() {
    const goals = JSON.parse(localStorage.getItem('weeklyGoals') || '[]');
    const list  = document.getElementById('goalsList');
    if (!list) return;
    list.innerHTML = goals.length ? goals.map(g => `
        <div class="goal-item${g.completed ? ' completed' : ''}">
            <input type="checkbox" ${g.completed ? 'checked' : ''} onchange="toggleGoal(${g.id})">
            <div class="goal-text">${esc(g.text)}</div>
            <button class="goal-delete" onclick="deleteGoal(${g.id})">✕</button>
        </div>`).join('') :
        '<div style="text-align:center;color:var(--text-muted);font-size:0.88rem;padding:12px 0;">אין מטרות עדיין — הוסף אחת!</div>';
}

function toggleGoal(id) {
    const goals = JSON.parse(localStorage.getItem('weeklyGoals') || '[]');
    const g = goals.find(g => g.id === id);
    if (g) { g.completed = !g.completed; localStorage.setItem('weeklyGoals', JSON.stringify(goals)); }
    renderGoals(); updateGoalsProgress(); loadStatCards();
}

function deleteGoal(id) {
    const goals = JSON.parse(localStorage.getItem('weeklyGoals') || '[]').filter(g => g.id !== id);
    localStorage.setItem('weeklyGoals', JSON.stringify(goals));
    renderGoals(); updateGoalsProgress(); loadStatCards();
}

function resetWeeklyGoals() {
    if (!confirm('למחוק את כל המטרות השבועיות?')) return;
    localStorage.removeItem('weeklyGoals');
    renderGoals(); updateGoalsProgress(); loadStatCards();
}

function updateGoalsProgress() {
    const goals     = JSON.parse(localStorage.getItem('weeklyGoals') || '[]');
    const completed = goals.filter(g => g.completed).length;
    const total     = goals.length;
    const pct       = total === 0 ? 0 : Math.round((completed / total) * 100);
    const bar = document.getElementById('goalsProgressBar');
    const pctEl = document.getElementById('goalsPercentage');
    if (bar) bar.style.width = pct + '%';
    if (pctEl) pctEl.textContent = `${completed}/${total} משימות הושלמו`;
}

function loadStatCards() {
    const goals     = JSON.parse(localStorage.getItem('weeklyGoals') || '[]');
    const completed = goals.filter(g => g.completed).length;
    const el = document.getElementById('progressCompleted');
    if (el) el.textContent = completed;
}
