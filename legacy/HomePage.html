<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>דף עבודה | למידה חכמה</title>
<link rel="stylesheet" href="styles.css">
<style>
/* ===== PAGE LAYOUT — default: input full-screen ===== */
.work-page {
  max-width: 1200px;
  margin: 0 auto;
  display: block;
  padding-bottom: 40px;
}

/* Shared card surface */
#input-col, #checklist-col {
  background: var(--bg-card);
  border: 1px solid rgba(148, 252, 196, 0.18);
  border-radius: 22px;
  padding: 32px 28px;
  backdrop-filter: blur(12px);
  box-shadow: 0 6px 32px rgba(7,11,22,0.22);
  display: flex;
  flex-direction: column;
  gap: 28px;
}

/* Checklist hidden until tasks are ready */
#checklist-col {
  display: none;
}

/* ===== TASKS-READY: checklist full-screen, input becomes drawer ===== */
.work-page.tasks-ready #checklist-col {
  display: flex;
}

.work-page.tasks-ready #input-col {
  position: fixed;
  top: 0;
  right: -440px;
  width: 420px;
  height: 100vh;
  overflow-y: auto;
  z-index: 300;
  transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  border-right: none;
  border-radius: 22px 0 0 22px;
  padding: 28px 24px;
  box-shadow: -8px 0 48px rgba(7,11,22,0.55);
  gap: 24px;
}

.work-page.tasks-ready #input-col.drawer-open {
  right: 0;
}

/* Drawer tab — hidden until tasks-ready activates it via JS */
.drawer-tab {
  display: none;
  position: fixed;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  z-index: 299;
  writing-mode: vertical-rl;
  text-orientation: mixed;
  background: rgba(20, 40, 80, 0.92);
  border: 1px solid rgba(148, 252, 196, 0.28);
  border-right: none;
  border-radius: 10px 0 0 10px;
  color: var(--text-secondary);
  font-family: inherit;
  font-size: 0.82rem;
  font-weight: 600;
  padding: 18px 10px;
  cursor: pointer;
  transition: all 0.2s;
  backdrop-filter: blur(6px);
}

.drawer-tab:hover {
  background: rgba(37, 99, 235, 0.45);
  color: var(--text-bright);
}

/* Overlay behind the drawer */
.drawer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  z-index: 298;
  display: none;
  backdrop-filter: blur(2px);
}

.drawer-overlay.visible {
  display: block;
}

/* Strip card box-styling inside both columns */
#checklist-col .card,
#checklist-col .card-accent,
#input-col .card,
#input-col .card-accent {
  background: transparent;
  border: none;
  border-radius: 0;
  padding: 0;
  box-shadow: none;
}

#checklist-col .card:hover,
#input-col .card:hover { border: none; }

@media (max-width: 900px) {
  .work-page { grid-template-columns: 1fr; max-width: 100%; padding: 0 12px 40px; }
  .work-page.tasks-ready #input-col { width: 90vw; right: -92vw; }
}

/* ===== FALLBACK CARD (used outside work-col if any) ===== */
.card {
  background: var(--bg-card);
  border: 1px solid rgba(148, 252, 196, 0.7);
  border-radius: 16px;
  padding: 1.35rem;
  box-shadow: 0 4px 16px rgba(7,11,22,0.18);
  transition: border-color 0.2s ease;
}

.card-accent {
  background: rgba(20, 30, 55, 0.85);
  border: 1px solid rgba(148, 252, 196, 0.7);
  border-radius: 16px;
  padding: 1.35rem;
  box-shadow: 0 4px 20px rgba(37,99,235,0.12);
}

/* ===== LABELS & INPUTS ===== */
label, .label-alt {
  font-size: 13px;
  color: var(--text-muted);
  display: block;
  margin-bottom: 6px;
  font-weight: 500;
}

textarea,
input[type="text"],
input[type="date"],
input[type="number"] {
  width: 100%;
  border: 1px solid rgba(148,163,184,0.2);
  border-radius: 9px;
  padding: 9px 12px;
  font-size: 14px;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: rgba(255,255,255,0.06);
  color: var(--text);
  transition: all 0.2s;
}

textarea { resize: vertical; }

textarea:focus,
input:focus {
  outline: none;
  border-color: var(--accent);
  background: rgba(37,99,235,0.08);
  box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
}

/* ===== BUTTONS ===== */
.btn {
  width: 100%;
  padding: 11px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  color: white;
  border: none;
  border-radius: 9px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  margin-top: 8px;
  transition: all 0.25s;
}

.btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 18px rgba(37,99,235,0.35);
}

.btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }

.btn-outline {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid rgba(148,163,184,0.28);
}

.btn-outline:hover {
  background: rgba(148,163,184,0.1);
  color: var(--text-bright);
  box-shadow: none;
}

.btn-sm { width: auto; padding: 7px 13px; margin-top: 0; font-size: 13px; }

/* ===== SECTION TITLE ===== */
.section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(148, 163, 184, 0.12);
}

/* ===== ROW LAYOUT ===== */
.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}

/* ===== DIVIDER ===== */
.demands-divider {
  border: none;
  border-top: 1px solid rgba(148,163,184,0.18);
  margin: 14px 0;
}

/* ===== SUMMARY ===== */
.summary-row {
  display: flex;
  justify-content: space-between;
  padding: 7px 0;
  border-bottom: 1px solid rgba(148,163,184,0.1);
  font-size: 14px;
}

.summary-row:last-child { border-bottom: none; }
.summary-key { color: var(--text-muted); }
.summary-val { font-weight: 600; color: var(--text-bright); }

/* ===== SPINNER ===== */
.spinner {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.25);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-left: 6px;
}

.hidden { display: none; }

/* ===== TIMELINE ===== */
.timeline-item {
  display: grid;
  grid-template-columns: 1.4fr 1fr auto;
  gap: 8px;
  align-items: center;
  background: rgba(255,255,255,0.04);
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 8px;
  border: 1px solid rgba(148,163,184,0.14);
}

.timeline-item strong {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
}

.timeline-item input { border: 1px solid rgba(148,163,184,0.2); }

.timeline-empty {
  font-size: 14px;
  color: var(--text-muted);
  text-align: center;
  padding: 1.2rem 0;
}

/* ===== TIMELINE ACTIONS ===== */
.timeline-actions { display: flex; gap: 10px; margin-top: 12px; }
.timeline-actions .btn { flex: 1; }

/* ===== SUB-TASKS ===== */
.subtask-item {
  background: rgba(255,255,255,0.04);
  border-radius: 11px;
  padding: 13px;
  margin-bottom: 10px;
  border: 1px solid rgba(148,163,184,0.14);
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
  transition: border-color 0.2s ease;
}

.subtask-item:hover { border-color: rgba(37,99,235,0.3); }

.subtask-item input[type="text"] {
  font-weight: 600;
  font-size: 14px;
}

.subtask-item textarea {
  font-size: 13px;
  color: var(--text-secondary);
  resize: vertical;
  min-height: 50px;
}

.subtask-delete {
  position: absolute;
  top: 10px; left: 10px;
  background: none; border: none;
  cursor: pointer;
  font-size: 16px;
  color: var(--text-muted);
  padding: 2px 6px;
  border-radius: 4px;
  transition: color 0.2s;
}

.subtask-delete:hover { color: #ef4444; }

.subtask-add-row { margin-top: 4px; }

/* ── Input card collapse ── */
#inputCardBody {
  overflow: hidden;
  transition: all 0.3s ease;
}
#inputCardBody.collapsed {
  display: none;
}
.input-toggle-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 10px 16px;
  background: rgba(37,99,235,0.1);
  border: 1px solid rgba(37,99,235,0.25);
  border-radius: 12px;
  color: var(--text-secondary);
  font-family: inherit;
  font-size: 0.88rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.input-toggle-btn:hover {
  background: rgba(37,99,235,0.18);
  color: var(--text-bright);
}
.input-toggle-arrow { font-size: 0.75rem; color: var(--text-muted); }

/* ===== CARD HEADER ===== */
.card-header-row {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 16px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(148, 163, 184, 0.12);
}

/* ===== HIERARCHICAL CHECKLIST ===== */
.hl-progress-info {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 6px; font-size: 0.82rem; color: var(--text-muted);
}
.hl-pct { font-weight: 800; color: var(--accent); font-size: 0.95rem; }
.hl-progress-bar-container {
  height: 7px; background: rgba(255,255,255,0.06); border-radius: 999px;
  border: 1px solid var(--border); overflow: hidden; margin-bottom: 16px;
}
.hl-progress-bar {
  height: 100%; background: linear-gradient(90deg,#10b981,#3b82f6);
  border-radius: 999px; transition: width 0.5s ease;
}
.hl-list { display: flex; flex-direction: column; gap: 8px; }

.hl-level-1 {
  background: rgba(37,99,235,0.07); border: 1px solid rgba(37,99,235,0.2);
  border-radius: 12px; padding: 13px;
}
.hl-level-2 {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(148,163,184,0.12);
  border-radius: 9px; padding: 10px 12px; margin-top: 7px;
}
.hl-level-3 {
  display: flex; align-items: flex-start; gap: 7px;
  padding: 5px 8px; border-radius: 6px; margin-top: 5px;
  background: rgba(255,255,255,0.02);
}
.hl-level1-header, .hl-level2-header {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.hl-level-1 input[type="checkbox"],
.hl-level-2 input[type="checkbox"],
.hl-level-3 input[type="checkbox"] {
  width: 16px; height: 16px; cursor: pointer;
  accent-color: #10b981; flex-shrink: 0; margin-top: 1px;
}
.hl-level1-label {
  font-size: 0.9rem; font-weight: 700; color: var(--text-bright); flex: 1; cursor: pointer;
}
.hl-level2-label {
  font-size: 0.86rem; font-weight: 600; color: var(--text-secondary); flex: 1; cursor: pointer;
}
.hl-level-3 label {
  font-size: 0.8rem; color: var(--text-muted); flex: 1; cursor: pointer; line-height: 1.5;
}
.hl-done { text-decoration: line-through; opacity: 0.45; }
.hl-time-badge {
  font-size: 0.72rem; font-weight: 700; font-family: monospace;
  color: #60a5fa; background: rgba(37,99,235,0.12);
  border: 1px solid rgba(37,99,235,0.22); padding: 2px 7px;
  border-radius: 999px; white-space: nowrap; flex-shrink: 0;
}
.hl-date-badge {
  font-size: 0.72rem; font-weight: 600; color: #a78bfa;
  background: rgba(124,58,237,0.12); border: 1px solid rgba(124,58,237,0.22);
  padding: 2px 7px; border-radius: 999px; white-space: nowrap; flex-shrink: 0;
}
.hl-children { margin-top: 6px; }

/* Unified task description + date-input per task */
.hl-desc {
  font-size: 0.8rem; color: var(--text-muted); line-height: 1.55;
  margin: 6px 0 0 24px; padding-right: 4px;
}
.hl-date-input {
  font-size: 0.72rem; color: #a78bfa; background: rgba(124,58,237,0.1);
  border: 1px solid rgba(124,58,237,0.28); border-radius: 8px;
  padding: 3px 7px; cursor: pointer; font-family: inherit; flex-shrink: 0;
  transition: border-color 0.2s, background 0.2s;
}
.hl-date-input:focus { outline: none; border-color: #a78bfa; background: rgba(124,58,237,0.18); }
.hl-date-input::-webkit-calendar-picker-indicator { filter: invert(0.6) sepia(1) saturate(3) hue-rotate(220deg); }
.hl-btn-row {
  display: flex; gap: 10px; margin-top: 16px;
}
.hl-save-btn {
  flex: 1; padding: 14px;
  background: linear-gradient(135deg,#7c3aed,#2563eb); color: white;
  border: none; border-radius: 11px; font-size: 0.95rem; font-weight: 800;
  font-family: inherit; cursor: pointer; transition: all 0.2s ease;
}
.hl-save-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(124,58,237,0.4); }
.hl-compile-btn {
  flex: 1; padding: 14px;
  background: linear-gradient(135deg,#059669,#0284c7); color: white;
  border: none; border-radius: 11px; font-size: 0.95rem; font-weight: 800;
  font-family: inherit; cursor: pointer; transition: all 0.2s ease;
}
.hl-compile-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(5,150,105,0.35); }

/* Save toast */
.save-toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: linear-gradient(135deg,#7c3aed,#2563eb); color: white;
  padding: 12px 28px; border-radius: 999px; font-weight: 700; font-size: 0.9rem;
  z-index: 2000; box-shadow: 0 6px 24px rgba(124,58,237,0.45);
  animation: toastIn 0.3s ease;
  pointer-events: none;
}
@keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(8px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }

/* ===== REBUILD DIALOG ===== */
.rebuild-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 500; display: none; backdrop-filter: blur(3px);
}
.rebuild-overlay.visible { display: block; }
.rebuild-dialog {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.95);
  z-index: 501; display: none; flex-direction: column; gap: 14px;
  background: var(--bg-card); border: 1px solid rgba(148,252,196,0.28);
  border-radius: 18px; padding: 28px; width: min(480px, 90vw);
  box-shadow: 0 20px 60px rgba(0,0,0,0.55);
  transition: transform 0.2s ease;
}
.rebuild-dialog.visible {
  display: flex; transform: translate(-50%, -50%) scale(1);
}
.rebuild-dialog textarea {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(148,163,184,0.25);
  border-radius: 10px; color: var(--text-bright); padding: 10px 12px;
  font-family: inherit; font-size: 0.9rem; width: 100%; box-sizing: border-box;
}
.rebuild-dialog textarea:focus { outline: none; border-color: rgba(148,252,196,0.5); }

/* ===== STUCK COACH ===== */
.stuck-fab {
  position: fixed; bottom: 24px; left: 24px; z-index: 999;
  background: linear-gradient(135deg,#f97316,#ef4444); color: white;
  border: none; border-radius: 999px; padding: 11px 20px;
  font-size: 0.9rem; font-weight: 800; font-family: inherit;
  cursor: pointer; box-shadow: 0 5px 18px rgba(249,115,22,0.4);
  transition: all 0.2s ease;
}
.stuck-fab:hover { transform: translateY(-2px) scale(1.04); }

.stuck-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 999;
}
.stuck-panel {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
  background: var(--bg-card); border-top: 1px solid var(--border);
  border-radius: 22px 22px 0 0; padding: 18px; max-height: 72vh;
  display: flex; flex-direction: column; box-shadow: 0 -6px 36px rgba(0,0,0,0.3);
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
@keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }

.stuck-panel-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.stuck-panel-header h3 { font-size:0.95rem; color:var(--text-bright); font-weight:700; }
.stuck-panel-header p  { font-size:0.74rem; color:var(--text-muted); margin-top:2px; }
.stuck-close { background:none; border:none; color:var(--text-muted); font-size:1.3rem; cursor:pointer; padding:4px; }
.stuck-close:hover { color:var(--text-bright); }

.stuck-messages {
  flex:1; overflow-y:auto; display:flex; flex-direction:column;
  gap:9px; margin-bottom:12px; max-height:38vh;
}
.stuck-msg {
  max-width:80%; padding:9px 13px; border-radius:14px;
  font-size:0.84rem; line-height:1.55; white-space:pre-wrap;
}
.stuck-msg.assistant {
  background:rgba(255,255,255,0.06); color:var(--text-secondary);
  border-radius:14px 14px 14px 4px; align-self:flex-end;
}
.stuck-msg.user {
  background:linear-gradient(135deg,var(--accent),var(--purple)); color:white;
  border-radius:14px 14px 4px 14px; align-self:flex-start; margin-right:auto;
}
.stuck-input-row { display:flex; gap:7px; }
.stuck-input-row textarea {
  flex:1; resize:none; padding:9px 12px;
  border:1px solid rgba(148,163,184,0.22); border-radius:10px;
  background:rgba(255,255,255,0.05); color:var(--text);
  font-size:0.84rem; font-family:inherit; line-height:1.4;
}
.stuck-input-row textarea:focus { outline:none; border-color:#f97316; background:rgba(249,115,22,0.06); }
.stuck-send-btn {
  padding:9px 14px; background:linear-gradient(135deg,#f97316,#ef4444);
  color:white; border:none; border-radius:10px; font-weight:700;
  font-family:inherit; cursor:pointer; font-size:0.84rem; align-self:flex-end;
  transition:all 0.2s ease;
}
.stuck-send-btn:hover { transform:translateY(-1px); }
.stuck-send-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
.stuck-typing { font-style:italic; opacity:0.6; animation:pulse 1.2s infinite; }
@keyframes pulse { 0%,100%{opacity:0.6;} 50%{opacity:1;} }
</style>
</head>
<body>
<div class="page">

  <!-- Navigation Header -->
  <header class="site-header">
    <img src="logo.svg" class="logo" alt="Think Step" />
    <nav>
      <a href="index.html">דף הבית</a>
      <a href="HomePage.html" class="active">דף עבודה</a>
      <a href="writing.html">כתיבה</a>
            <a href="search.html">חיפוש</a>
      <a href="profile.html">פרופיל</a>
      <a href="about.html">אודות</a>
    </nav>
    <button class="cta-button" id="welcomeBtn" onclick="window.location.href='index.html'">דף הבית</button>
  </header>
  <script>
    (function(){
      const p = JSON.parse(localStorage.getItem('userProfile') || '{}');
      const name = p.username || p.fullName;
      if (name) {
        const btn = document.getElementById('welcomeBtn');
        btn.textContent = 'ברוך הבא: ' + name;
        btn.onclick = function(){ window.location.href = 'profile.html'; };
      }
    })();
  </script>

  <!-- Drawer overlay -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="toggleInputDrawer()"></div>

  <!-- Side tab to open the input drawer -->
  <button class="drawer-tab" id="drawerTab" onclick="toggleInputDrawer()">✏️ פרטי משימה</button>

  <div class="work-page" id="work-page">

    <!-- ═══ עמודה שמאל: קלט ✦ סיכום ✦ משימות (drawer) ═══ -->
    <div id="input-col" class="work-col">

      <!-- Toggle button — shows when card is collapsed -->
      <button class="input-toggle-btn" id="inputToggleBtn" onclick="toggleInputCard()" style="display:none">
        ✏️ פרטי משימה &amp; דרישות
        <span class="input-toggle-arrow">▼</span>
      </button>

      <!-- כרטיס פרטי משימה (collapsible) -->
      <div class="card-accent" id="inputCard">
        <div class="card-header-row" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="toggleInputCard()">
          <span>פרטי המשימה</span>
          <span id="inputCollapseArrow" style="font-size:0.8rem;color:var(--text-muted)">▲ סגור</span>
        </div>
        <div id="inputCardBody">
          <div class="row">
            <div><label>מקצוע</label><input type="text" id="subject" placeholder="היסטוריה, מדע..."></div>
            <div><label>נושא</label><input type="text" id="topic" placeholder="נושא העבודה"></div>
          </div>
          <div class="row">
            <div><label>מספר עמודים</label><input type="number" id="pages" placeholder="5" min="1" max="1000"></div>
            <div><label>תאריך הגשה</label><input type="date" id="date"></div>
          </div>

          <hr class="demands-divider">

          <label>דרישות העבודה</label>
          <textarea id="demands-input" rows="4" placeholder="הדבק כאן את הנחיות המורה / דרישות המטלה..."></textarea>

<script>
/* All page logic in a plain script — functions must be global for onclick handlers */

const MILESTONES = [
  { name: "הבנת המשימה ובחירת מבנה", p: 0.10 },
  { name: "בחירת מקורות",             p: 0.30 },
  { name: "איסוף מקורות",              p: 0.50 },
  { name: "כתיבת פסקה ראשונה",        p: 0.70 },
  { name: "עריכה וסיכום",              p: 0.90 },
  { name: "הגשה סופית",               p: 1.00 }
];

let currentTimeline = [];
let subtasks = [];

function activateTasksLayout() {
  document.getElementById('work-page').classList.add('tasks-ready');
  document.getElementById('drawerTab').style.display = 'block';
}

function openRebuildDialog() {
  document.getElementById('rebuildFeedback').value = '';
  document.getElementById('rebuildOverlay').classList.add('visible');
  document.getElementById('rebuildDialog').classList.add('visible');
  setTimeout(() => document.getElementById('rebuildFeedback').focus(), 50);
}

function closeRebuildDialog() {
  document.getElementById('rebuildOverlay').classList.remove('visible');
  document.getElementById('rebuildDialog').classList.remove('visible');
}

async function confirmRebuild() {
  const feedback = document.getElementById('rebuildFeedback').value.trim();
  closeRebuildDialog();

  const demandsText = document.getElementById('demands-input').value.trim();
  if (!demandsText) {
    alert('פתח את פרטי המשימה והכנס דרישות עבודה לפני הבנייה מחדש.');
    return;
  }

  const btn = document.getElementById('rebuildConfirmBtn');
  btn.disabled = true;

  document.getElementById('hierarchicalChecklist').innerHTML = `
    <div style="text-align:center;padding:32px 0;color:#6b7280">
      <div style="font-size:28px;margin-bottom:10px;animation:spin 1s linear infinite;display:inline-block">⚙️</div>
      <div style="font-size:15px;font-weight:600">ה-AI בונה מחדש לפי הערותיך...</div>
    </div>`;

  const context = {
    subject:  document.getElementById('subject').value.trim(),
    topic:    document.getElementById('topic').value.trim(),
    pages:    document.getElementById('pages').value.trim(),
    dueDate:  document.getElementById('date').value,
    feedback,
  };

  try {
    const result = await window.logicManager.analyzeDemandsAndCreateSubtasks(demandsText, context);
    if (result && result.length > 0) {
      subtasks = result;
      rebuildTimeline();
    } else {
      document.getElementById('hierarchicalChecklist').innerHTML =
        `<div style="text-align:center;padding:24px;color:#ef4444">לא הצלחנו לבנות מחדש. נסה שוב.</div>`;
    }
  } catch (e) {
    console.error('שגיאה בבנייה מחדש:', e);
    document.getElementById('hierarchicalChecklist').innerHTML =
      `<div style="text-align:center;padding:24px;color:#ef4444">אירעה שגיאה. בדוק חיבור לאינטרנט ונסה שוב.</div>`;
  } finally {
    btn.disabled = false;
  }
}

function toggleInputDrawer() {
  const col     = document.getElementById('input-col');
  const overlay = document.getElementById('drawerOverlay');
  const tab     = document.getElementById('drawerTab');
  const isOpen  = col.classList.toggle('drawer-open');
  overlay.classList.toggle('visible', isOpen);
  tab.style.display = isOpen ? 'none' : 'block';
}

function toggleInputCard() {
  const col = document.getElementById('input-col');
  if (col.classList.contains('drawer-open')) toggleInputDrawer();
}

function setLoading(labelId, spinnerId, btnId, on) {
  const labels = { 'analyze-label': ['נתח וצור משימות', 'מנתח...'] };
  document.getElementById(labelId).textContent = on ? labels[labelId][1] : labels[labelId][0];
  document.getElementById(spinnerId).classList.toggle('hidden', !on);
  if (btnId) document.getElementById(btnId).disabled = on;
}

function showSummary() {
  const subject = document.getElementById('subject').value.trim();
  const topic   = document.getElementById('topic').value.trim();
  const pages   = document.getElementById('pages').value.trim();
  const date    = document.getElementById('date').value;

  const summaryCard = document.getElementById('summary-card');
  summaryCard.classList.remove('hidden');
  document.getElementById('summary-content').innerHTML = `
    ${subject ? `<div class="summary-row"><span class="summary-key">מקצוע</span><span class="summary-val">${subject}</span></div>` : ''}
    ${topic   ? `<div class="summary-row"><span class="summary-key">נושא</span><span class="summary-val">${topic}</span></div>` : ''}
    ${pages   ? `<div class="summary-row"><span class="summary-key">עמודים</span><span class="summary-val">${pages}</span></div>` : ''}
    ${date    ? `<div class="summary-row"><span class="summary-key">תאריך הגשה</span><span class="summary-val">${date}</span></div>` : ''}
  `;
  if (date) rebuildTimeline();
}

async function handleAnalyzeDemands() {
  const demandsText = document.getElementById('demands-input').value.trim();
  if (!demandsText) { alert('אנא הדבק את דרישות העבודה לפני הניתוח'); return; }

  showSummary();
  setLoading('analyze-label', 'analyze-spinner', 'analyze-btn', true);

  const context = {
    subject: document.getElementById('subject').value.trim(),
    topic:   document.getElementById('topic').value.trim(),
    pages:   document.getElementById('pages').value.trim(),
    dueDate: document.getElementById('date').value,
  };

  if (!window.logicManager || typeof window.logicManager.analyzeDemandsAndCreateSubtasks !== 'function') {
    setLoading('analyze-label', 'analyze-spinner', 'analyze-btn', false);
    return;
  }

  // Switch to tasks layout immediately — checklist expands, input becomes drawer
  activateTasksLayout();
  document.getElementById('hierarchicalChecklist').innerHTML = `
    <div style="text-align:center;padding:32px 0;color:#6b7280">
      <div style="font-size:28px;margin-bottom:10px;animation:spin 1s linear infinite;display:inline-block">⚙️</div>
      <div style="font-size:15px;font-weight:600">ה-AI בונה את לוח הזמנים...</div>
      <div style="font-size:12px;margin-top:4px;opacity:.7">זה יכול לקחת עד 10 שניות</div>
    </div>`;

  try {
    const result = await window.logicManager.analyzeDemandsAndCreateSubtasks(demandsText, context);
    subtasks = result.length > 0 ? result : [];
    if (subtasks.length === 0) {
      document.getElementById('hierarchicalChecklist').innerHTML =
        `<div style="text-align:center;padding:24px;color:#ef4444">לא הצלחנו לנתח את הדרישות. נסה לנסח אותן בצורה ברורה יותר.</div>`;
    } else {
      rebuildTimeline(); // computes dates then calls buildChecklist
    }
  } catch (e) {
    console.error('שגיאה בניתוח דרישות:', e);
    document.getElementById('hierarchicalChecklist').innerHTML =
      `<div style="text-align:center;padding:24px;color:#ef4444">אירעה שגיאה. בדוק את החיבור לאינטרנט ונסה שוב.</div>`;
  } finally {
    setLoading('analyze-label', 'analyze-spinner', 'analyze-btn', false);
  }
}

function renderSubtasks() {
  const list = document.getElementById('subtasks-list');
  if (!list) return;
  list.innerHTML = subtasks.map((st, i) => `
    <div class="subtask-item">
      <button class="subtask-delete" onclick="deleteSubtask(${i})" title="מחק משימה">×</button>
      <input type="text" value="${escapeAttr(st.title)}" placeholder="שם המשימה"
        oninput="subtasks[${i}].title = this.value">
      <textarea placeholder="תיאור המשימה"
        oninput="subtasks[${i}].description = this.value">${escapeHtml(st.description)}</textarea>
    </div>
  `).join('');
}

function escapeAttr(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function escapeHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function deleteSubtask(i) {
  subtasks.splice(i, 1);
  renderSubtasks();
  rebuildTimeline();
}

function addSubtask() {
  subtasks.push({ id: `task-${Date.now()}`, title: '', description: '' });
  renderSubtasks();
  const card = document.getElementById('subtasks-card');
  if (card) card.classList.remove('hidden');
  rebuildTimeline();
}

function rebuildTimeline() {
  const dateVal = document.getElementById('date').value;
  if (!dateVal) { buildChecklist(); return; }

  const finalDate = new Date(dateVal);
  if (isNaN(finalDate.getTime())) { buildChecklist(); return; }

  const today = new Date(); today.setHours(0,0,0,0);

  if (subtasks.length > 0) {
    const sched = computeSchedule(subtasks, today, finalDate);
    currentTimeline = subtasks.map((task, i) => ({
      title:   task.title,
      date:    sched[i].isoDate,
      timeStr: sched[i].timeStr,
    }));
  } else {
    const totalDays = Math.max(0, Math.round((finalDate - today) / 86400000));
    currentTimeline = MILESTONES.map(m => {
      const d = new Date(today);
      d.setDate(today.getDate() + Math.round(totalDays * m.p));
      return { title: m.name, date: d.toISOString().split('T')[0], timeStr: null };
    });
  }

  buildChecklist();
}

// Called when user changes a date directly inside a task row
window.updateTaskDate = function(i, val) {
  if (val && currentTimeline[i]) {
    currentTimeline[i].date = val;
    buildChecklist();
  }
};

// (all functions above are global in a plain script — no window.* assignments needed)

/* ================================================================
   HIERARCHICAL CHECKLIST + COMPILE (Features 1 + 7 + 8)
   ================================================================ */
const CHECKLIST_KEY = 'task_checklist_state';

// Compute date + time slot for each task based on real project timeline
function computeSchedule(subtasks, today, due) {
  const n         = subtasks.length;
  const totalDays = Math.max(1, Math.round((due - today) / 86400000));

  const dayOffsets = subtasks.map((_, i) =>
    n > 1 ? Math.round((i / (n - 1)) * (totalDays - 1)) : 0
  );

  return subtasks.map((_, i) => {
    const dayOffset = dayOffsets[i];
    const d         = new Date(today.getTime() + dayOffset * 86400000);
    const isoDate   = d.toISOString().split('T')[0];
    const dateFmt   = d.toLocaleDateString('he-IL', { weekday:'short', day:'numeric', month:'short' });

    const slot   = dayOffsets.slice(0, i).filter(o => o === dayOffset).length;
    const startH = 9 + slot * 2;
    const endH   = startH + 2;
    const timeStr = `${String(startH).padStart(2,'0')}:00–${String(endH).padStart(2,'0')}:00`;

    return { isoDate, dateFmt, timeStr };
  });
}

function buildChecklist() {
  const container = document.getElementById('hierarchicalChecklist');

  if (!subtasks.length) {
    container.innerHTML = '<div class="timeline-empty">הזן דרישות עבודה ולחץ "נתח וצור משימות".</div>';
    return;
  }

  const completion = JSON.parse(localStorage.getItem(CHECKLIST_KEY) || '{}');
  const dateVal    = document.getElementById('date').value;
  const today      = new Date(); today.setHours(0,0,0,0);
  const due        = dateVal ? new Date(dateVal) : new Date(today.getTime() + 14 * 86400000);

  // Resolve per-task date/time: prefer currentTimeline, fall back to fresh schedule
  const baseSchedule = computeSchedule(subtasks, today, due);
  const schedule = baseSchedule.map((s, i) => {
    const tl = currentTimeline.length === subtasks.length ? currentTimeline[i] : null;
    if (tl?.date) {
      const d = new Date(tl.date);
      return {
        isoDate: tl.date,
        dateFmt: d.toLocaleDateString('he-IL', { weekday:'short', day:'numeric', month:'short' }),
        timeStr: tl.timeStr || s.timeStr,
      };
    }
    return s;
  });

  function parseSteps(desc) {
    if (!desc) return [];
    return desc.split(/\.\s+|[\n;]/)
      .map(s => s.replace(/^\d+[.)]\s*/, '').trim())
      .filter(s => s.length > 5).slice(0, 3);
  }

  let totalItems = 0, doneItems = 0;

  const tasksHtml = subtasks.map((task, i) => {
    const taskId   = `task-${task.id || i}`;
    const taskDone = !!completion[taskId];
    totalItems++; if (taskDone) doneItems++;

    const { isoDate, timeStr } = schedule[i];
    const steps     = parseSteps(task.description);
    const stepsHtml = steps.map((step, si) => {
      const stepId   = `step-${task.id || i}-${si}`;
      const stepDone = !!completion[stepId];
      totalItems++; if (stepDone) doneItems++;
      return `<div class="hl-level-3">
        <input type="checkbox" id="${stepId}" ${stepDone ? 'checked' : ''}
               onchange="window.toggleHL('${stepId}',this.checked)">
        <label for="${stepId}" class="${stepDone ? 'hl-done' : ''}">${escapeHtml(step)}</label>
      </div>`;
    }).join('');

    return `<div class="hl-level-1">
      <div class="hl-level1-header">
        <input type="checkbox" id="${taskId}" ${taskDone ? 'checked' : ''}
               onchange="window.toggleHL('${taskId}',this.checked)">
        <label class="hl-level1-label ${taskDone ? 'hl-done' : ''}" for="${taskId}">
          ${escapeHtml(task.title)}
        </label>
        <input type="date" class="hl-date-input" value="${isoDate || ''}"
               onchange="window.updateTaskDate(${i}, this.value)" title="שנה תאריך">
        <span class="hl-time-badge">${timeStr}</span>
      </div>
      ${task.description ? `<div class="hl-desc">${escapeHtml(task.description)}</div>` : ''}
      ${stepsHtml ? `<div class="hl-children">${stepsHtml}</div>` : ''}
    </div>`;
  }).join('');

  const pct = totalItems > 0 ? Math.round((doneItems / totalItems) * 100) : 0;

  container.innerHTML = `
    <div class="hl-progress-info">
      <span>${doneItems} / ${totalItems} משימות</span>
      <span class="hl-pct">${pct}%</span>
    </div>
    <div class="hl-progress-bar-container">
      <div class="hl-progress-bar" style="width:${pct}%"></div>
    </div>
    <div class="hl-list">${tasksHtml}</div>
    <div class="hl-btn-row">
      <button class="hl-save-btn"    onclick="window.saveProgress()">💾 שמור התקדמות</button>
      <button class="hl-compile-btn" onclick="window.compileReport()">📄 הורד דוח</button>
    </div>`;

  // Save state so RecursiveDecomposition page can also read it
  const appState = {
    topic:     document.getElementById('topic').value.trim() || 'פרויקט',
    subject:   document.getElementById('subject').value.trim(),
    dueDate:   dateVal,
    startDate: new Date().toISOString().split('T')[0],
    chunks:    subtasks,
    timeline:  currentTimeline,
  };
  localStorage.setItem('decompose_app_state', JSON.stringify(appState));
}

window.toggleHL = function(id, checked) {
  const state = JSON.parse(localStorage.getItem(CHECKLIST_KEY) || '{}');
  state[id] = checked;
  localStorage.setItem(CHECKLIST_KEY, JSON.stringify(state));
  buildChecklist();
};

window.compileReport = function() {
  const topic  = document.getElementById('topic').value.trim() || 'פרויקט';
  const dateVal = document.getElementById('date').value || '';
  const completion = JSON.parse(localStorage.getItem(CHECKLIST_KEY) || '{}');

  const today = new Date(); today.setHours(0,0,0,0);
  const due   = dateVal ? new Date(dateVal) : new Date(today.getTime() + 14*86400000);
  const baseSchedule = computeSchedule(subtasks, today, due);
  const schedule = baseSchedule.map((s, i) => {
    if (currentTimeline.length === subtasks.length && currentTimeline[i]?.date) {
      const d = new Date(currentTimeline[i].date);
      return {
        dateFmt: d.toLocaleDateString('he-IL', { weekday:'short', day:'numeric', month:'short' }),
        timeStr: currentTimeline[i].timeStr || s.timeStr,
      };
    }
    return s;
  });

  const rows = subtasks.map((task, i) => {
    const done = !!completion[`task-${task.id||i}`];
    const { dateFmt, timeStr } = schedule[i];
    return `<tr>
      <td style="text-align:center">${done?'✓':'○'}</td>
      <td style="padding-right:10px;font-size:13px;font-weight:bold">${escapeHtml(task.title)}</td>
      <td style="color:#6b7280;font-size:12px">${escapeHtml(task.description||'')}</td>
      <td style="font-family:monospace;font-size:11px;color:#3b82f6;white-space:nowrap">${dateFmt}</td>
      <td style="font-family:monospace;font-size:11px;color:#3b82f6;white-space:nowrap">${timeStr}</td>
    </tr>`;
  }).join('');

  const done  = subtasks.filter((_,i) => !!completion[`task-${_.id||i}`]).length;
  const total = subtasks.length;
  const pct   = total ? Math.round(done/total*100) : 0;

  const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office"
                       xmlns:w="urn:schemas-microsoft-com:office:word">
<head><meta charset="utf-8">
<style>
  body{font-family:Arial,sans-serif;direction:rtl;color:#1f2937}
  h1{font-size:20px;color:#1d4ed8;margin-bottom:4px}
  h2{font-size:13px;font-weight:normal;color:#6b7280;margin:0 0 14px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{background:#1d4ed8;color:white;padding:7px 10px;text-align:right}
  td{padding:6px 10px;border-bottom:1px solid #e5e7eb;vertical-align:top}
  .summary{margin-top:18px;padding:10px 14px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:7px}
</style></head>
<body>
<h1>${escapeHtml(topic)}</h1>
<h2>תאריך הגשה: ${dateVal||'—'} | נוצר: ${new Date().toLocaleDateString('he-IL')}</h2>
<table>
  <thead><tr><th style="width:36px">סטטוס</th><th>משימה</th><th>תיאור</th><th style="white-space:nowrap">תאריך</th><th style="white-space:nowrap">חלון זמן</th></tr></thead>
  <tbody>${rows}</tbody>
</table>
<div class="summary"><strong>סיכום:</strong> ${done} / ${total} משימות הושלמו (${pct}%)</div>
</body></html>`;

  const blob = new Blob([html], { type:'application/msword;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `${topic.replace(/\s+/g,'-')}-report.doc`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
};

window.saveProgress = async function() {
  if (!subtasks.length) { alert('אין עדיין משימות לשמירה — נתח קודם את דרישות העבודה.'); return; }
  const appState = {
    topic:     document.getElementById('topic').value.trim() || 'פרויקט',
    subject:   document.getElementById('subject').value.trim(),
    dueDate:   document.getElementById('date').value,
    startDate: new Date().toISOString().split('T')[0],
    chunks:    subtasks,
    timeline:  currentTimeline,
    savedAt:   new Date().toISOString(),
  };

  // Always save locally
  localStorage.setItem('decompose_app_state', JSON.stringify(appState));

  // Try cloud save
  if (window.supabaseHelpers) {
    try {
      const user = await window.supabaseHelpers.getCurrentUser();
      if (user) {
        const ok = await window.supabaseHelpers.saveTaskState(user.id, appState);
        showSaveToast(ok ? '☁️ נשמר בענן — נגיש מכל מכשיר' : '✓ נשמר מקומית בלבד');
      } else {
        showSaveToast('✓ נשמר מקומית — <a href="profile.html" style="color:white;text-decoration:underline">התחבר</a> כדי לשמור בענן');
      }
    } catch { showSaveToast('✓ נשמר מקומית בלבד'); }
  } else {
    showSaveToast('✓ ההתקדמות נשמרה');
  }
};

// Auto-load saved state from cloud when supabase is ready
window.addEventListener('supabase:ready', async () => {
  try {
    const user = await window.supabaseHelpers.getCurrentUser();
    if (!user) return;
    const state = await window.supabaseHelpers.loadTaskState(user.id);
    if (!state || !state.chunks?.length) return;
    // Restore state into page
    if (state.topic)   document.getElementById('topic').value   = state.topic;
    if (state.subject) document.getElementById('subject').value = state.subject;
    if (state.dueDate) document.getElementById('date').value    = state.dueDate;
    subtasks = state.chunks;
    if (state.timeline) currentTimeline = state.timeline;
    localStorage.setItem('decompose_app_state', JSON.stringify(state));
    renderSubtasks();
    const subtasksCard = document.getElementById('subtasks-card');
    if (subtasksCard) subtasksCard.classList.remove('hidden');
    activateTasksLayout();
    rebuildTimeline();
    buildChecklist();
    showSaveToast('☁️ הפרויקט הקודם שלך נטען מהענן');
  } catch(e) { console.warn('cloud load skipped:', e); }
});

function showSaveToast(msg) {
  const existing = document.querySelector('.save-toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'save-toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

   ================================================================ */
const STUCK_HISTORY = [];
function buildCoachSystem() {
  const subject = document.getElementById('subject')?.value?.trim() || '';
  const topic   = document.getElementById('topic')?.value?.trim() || '';
  const tasks   = subtasks.map(t => t.title).filter(Boolean).join(', ');

  const context = [
    subject && `מקצוע: ${subject}`,
    topic   && `נושא העבודה: ${topic}`,
    tasks   && `המשימות הנוכחיות: ${tasks}`,
  ].filter(Boolean).join('\n');

  return `אתה מאמן למידה שעוזר לתלמידים לפרק עבודות בית לשלבים ולהתקדם.
${context ? `\nקונטקסט המשימה הנוכחית:\n${context}\n` : ''}
כללים:
1. ענה בעברית תמיד.
2. תן תשובה קצרה וממוקדת — עד 3 משפטים.
3. אם השאלה קשורה למשימה — עזור ישירות עם הצעה קונקרטית.
4. אל תיתן את כל העבודה — עזור לתלמיד לחשוב בעצמו.
5. אם השאלה לא ברורה — שאל שאלה מבהירה אחת.`;
}

window.openStuck = function() {
  document.getElementById('stuckPanel').style.display  = 'flex';
  document.getElementById('stuckOverlay').style.display = 'block';
  if (STUCK_HISTORY.length === 0) addStuckMsg('assistant', 'היי! נתקעת? זה לגמרי בסדר 🙌\nספר לי מה אתה מנסה לעשות ובמה בדיוק נתקעת.');
  document.getElementById('stuckInput').focus();
};

window.closeStuck = function() {
  document.getElementById('stuckPanel').style.display  = 'none';
  document.getElementById('stuckOverlay').style.display = 'none';
};

function addStuckMsg(role, text) {
  STUCK_HISTORY.push({ role, text });
  const container = document.getElementById('stuckMessages');
  const div = document.createElement('div');
  div.className = `stuck-msg ${role}`;
  div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

window.sendStuck = async function() {
  const input = document.getElementById('stuckInput');
  const btn   = document.getElementById('stuckSendBtn');
  const text  = input.value.trim();
  if (!text || btn.disabled) return;

  addStuckMsg('user', text);
  input.value = '';
  btn.disabled = true;

  const typing = document.createElement('div');
  typing.className = 'stuck-msg assistant stuck-typing';
  typing.textContent = 'חושב...';
  document.getElementById('stuckMessages').appendChild(typing);
  document.getElementById('stuckMessages').scrollTop = 99999;

  try {
    // השתמשות בשירות המרכזי של aiService שכבר מיובא למעלה
    // קריאה לפונקציה SOCRATIC_CHAT או יצירת פונקציה חדשה במיוחד לזה ב-aiService.
    const reply = await window.aiService.sendQuery("SOCRATIC_CHAT", text, null);
    
    typing.remove();
    addStuckMsg('assistant', reply || 'לא הצלחתי להבין, תוכל לנסח שוב?');
  } catch(err) {
    typing.remove();
    addStuckMsg('assistant', 'לא הצלחתי להתחבר ל-AI. נסה שוב.');
    console.error('[StuckCoach]', err);
  } finally {
    btn.disabled = false;
    input.focus();
  }
};
</script>
