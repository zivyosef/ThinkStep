<script>

  /**
   * --------------------------------------------------------
   * buildTimeline
   * --------------------------------------------------------
   * יוצרת תוכנית עבודה אוטומטית לפי תאריך הגשה
   *
   * @param {string} dueDate
   * תאריך הגשה בפורמט YYYY-MM-DD
   *
   * @returns {Array<Object>}
   * מערך של אבני דרך ותאריכים
   */
  function buildTimeline(dueDate) {

    // =========================================
    // שלב 1 — תאריך של היום
    // =========================================

    const today = new Date();



    // =========================================
    // שלב 2 — להפוך את תאריך ההגשה ל-Date
    // =========================================

    const finalDate = new Date(dueDate);



    // =========================================
    // שלב 3 — לחשב הפרש במילישניות
    // =========================================

    const diffInMilliseconds =
      finalDate - today;



    // =========================================
    // שלב 4 — כמה מילישניות יש ביום
    // =========================================

    const millisecondsPerDay =
      1000 * 60 * 60 * 24;



    // =========================================
    // שלב 5 — להמיר לימים
    // =========================================

    const totalDays = Math.round(
      diffInMilliseconds / millisecondsPerDay
    );



    // =========================================
    // שלב 6 — להגדיר milestones
    // =========================================

    const milestones = [

      {
        name: "הבנת המשימה",
        percentFromStart: 0.10
      },

      {
        name: "איסוף מקורות",
        percentFromStart: 0.30
      },

      {
        name: "כתיבת טיוטה ראשונה",
        percentFromStart: 0.70
      },

      {
        name: "עריכה ותיקונים",
        percentFromStart: 0.90
      },

      {
        name: "הגשה סופית",
        percentFromStart: 1.00
      }
    ];



    // =========================================
    // שלב 7 — לחשב תאריך לכל milestone
    // =========================================

    const timeline = milestones.map((milestone) => {

      // לחשב כמה ימים קדימה
      const daysFromNow = Math.round(
        totalDays * milestone.percentFromStart
      );



      // ליצור עותק של היום
      const milestoneDate =
        new Date(today);



      // להוסיף ימים
      milestoneDate.setDate(
        today.getDate() + daysFromNow
      );



      // להחזיר אובייקט
      return {

        milestone: milestone.name,

        date: milestoneDate
          .toISOString()
          .split("T")[0]
      };
    });



    // =========================================
    // שלב 8 — להחזיר את התוצאה
    // =========================================

    return timeline;
  }



  // =========================================
  // דוגמה לשימוש
  // =========================================

  const result =
    buildTimeline("2026-06-01");

  console.log(result);

</script>
